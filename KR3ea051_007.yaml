body:
  text: 七卷四時六氣異同篇天老問曰五臟合五時六經應六氣然診要經終篇以六氣應五臟而終於六經四時刺逆從論以六經應四時而終於五臟診要篇以經脈之生於五臟而外合於六經四時刺逆從論以經脈本於六氣而外連於五臟何也岐伯曰人身之脈氣上通天下合地未可一言盡也故彼此錯言之耳天老曰章句同而意旨異不善讀之吾恐執而不通也岐伯曰醫統天地人以立論不知天何知地不知地何知人脈氣循於皮肉筋骨之間內合五行外合六氣安得一言而盡乎不得不分之以歸於一也天老曰請問歸一之旨岐伯曰五時之合五臟也即六氣之合五臟也六氣之應六經也即五時之應六經也知其同何難知異哉天老曰善陳士鐸曰何嘗異何必求同何嘗同不妨言異人惟善求之可耳司天在泉分合篇天老問曰司天在泉二氣相合主歲何分岐伯曰歲半以上天氣主之歲半以下地氣主之天老曰司天之氣主上半歲乎在泉之氣主下半歲乎岐伯曰然天老曰司天之氣何以主上半歲也岐伯曰春夏者天之陰陽也陽生陰長天之氣也故上半歲主之天老曰在泉之氣何以主下半歲也岐伯曰秋冬者地之陰陽也陰殺陽藏地之氣也故下半歲主之天老曰一歲之中天地之氣截然分乎岐伯曰天地之氣無日不交司天之氣始於地之左在泉之氣本乎天之右一歲之中互相感召雖分而實不分也天老曰然則司天在泉何必分之乎岐伯曰不分言之則陰陽不明奚以得陰中有陽陽中有陰之義乎司天之氣始於地而終於天在泉之氣始於天而終於地天地升降環轉不息實有如此所以可合而亦可分之也天老曰司天之氣何以始於地在泉之氣何以始於天乎岐伯曰司天之氣始於地之左地中有天也在泉之氣始於天之右天中有地也天老曰善陳士鐸曰司天在泉合天地以論之才是善言天地者從化篇天老問曰燥從熱發風從燥起埃從風生雨從濕注熱從寒來其故何歟岐伯曰五行各有勝亦各有制也制之太過則受制者應之反從其化也所以熱之極者燥必隨之此金之從火也燥之極者風必隨之此木之從金也風之極者塵霾隨之此土之從木也濕蒸之極者霖雨隨之此水之從土也陰寒之極者雷電隨之此火之從水也乃承製相從之理何足異乎天老曰何道而使之不從乎岐伯曰從火者潤其金乎從金者抒其木乎從木者培其土乎從土者導其水乎從水者助其火乎毋不足毋有餘得其平而不從矣天老曰潤其金而金仍從火抒其木而木仍從金培其土而土仍從木導其水而水仍從土助其火而火仍從水奈何岐伯曰此陰陽之已變水火之已漓非藥石針灸之可療也陳士鐸曰言淺而論深冬夏火熱篇胡孔甲問於岐伯曰冬令嚴冷凜冽之氣逼人肌膚人宜畏寒反生熱症何也岐伯曰外寒則內益熱也胡孔甲曰外寒內熱人宜同病何故獨熱岐伯曰腎中水虛不能制火因外寒相激而火發也人生無臟非火無腑非火也無不藉腎水相養腎水盛則火藏腎水涸則火動內無水養則內熱已極又得外寒束之則火之鬱氣一發多不可救胡孔甲曰火必有所助而後盛火發於外外無火助宜火之少衰乃熱病發於夏轉輕發於冬反重何也岐伯曰此正顯火鬱之氣也暑日氣散而火難居冬日氣藏而火難泄難泄而泄之則鬱怒之氣所以難犯而轉重也胡孔甲曰可以治夏者治冬乎岐伯曰辨其火熱之真假耳毋論冬夏也胡孔甲曰善陳士鐸曰治郁無他治之法人亦治鬱而已矣暑火二氣篇祝融問於岐伯曰暑與火皆熱症也何六氣分為二乎岐伯曰暑病成於夏火病四時皆有故分為二也祝融問曰火病雖四時有之然多成於夏熱蘊於夏而發於四時宜暑包之矣岐伯曰火不止成於夏四時可成也火宜藏不宜發火發於夏日者火以引火也其在四時雖無火之可發而火蘊結於臟腑之中每能自發其酷烈之勢較外火引之者更橫安可談暑而不談火乎祝融曰火不可發也發則多不可救與暑熱之相犯有異乎岐伯曰暑與火熱同而實異也惟其不同故夏日之火不可與春秋冬之火共論惟其各異即夏日之暑不可與夏日之火併舉也蓋火病乃臟腑自生之熱非夏令暑熱所成之火故火症生於夏仍是火症不可謂火是暑暑即是火也祝融曰暑火非一也分二氣宜矣陳士鐸曰暑與火不可並論獨土至理陰陽上下篇常伯問於岐伯曰陽在上陰在下陽氣亦下行乎岐伯曰陰陽之氣上下相同陽之氣未嘗不行於下也常伯曰寒厥到膝不到顛頭痛到顛不到膝非陰氣在下陽氣在上之明驗乎岐伯曰陰氣生於陽陽氣生於陰蓋上下相通無彼此之離也陽氣從陰出於經脈之外陰氣從陽入於經脈之中始得氣血貫通而五臟七腑無不周遍也寒厥到膝陽不能達也非陽氣專在上而不在下也頭痛到顛陰不能降也非陰氣專在下而不在上也天地不外陰陽天地之陰陽不交則寒暑往來收藏生長咸無准實人何獨異哉陳士鐸曰陽宜達陰宜降也二者相反則達者不達降者不降矣論理陽之達有降之勢陰之降有達之機總貴陰陽之不可反也營衛交重篇雷公問曰陽氣出於衛氣陰氣出於營氣陰主死陽主生陽氣重於陰氣宜衛氣重於營氣矣岐伯曰營衛交重也雷公曰請問交重之旨岐伯曰宗氣積於上焦營氣出於中焦衛氣出於下焦蓋有天有陽氣有陰氣人稟天地之二氣亦有陰陽衛氣即陽也由下焦至中焦以升於上焦從陰出陽也營氣即陰也由中焦至上焦以降於下焦從陽入陰也二氣並重交相上下交相出入交相升降而後能生氣於無窮也雷公曰陰陽不可離豫既已知之矣但陰氣難升者謂何岐伯曰陰氣精專必隨宗氣以同行於經隧之中始於手太陰肺經太淵穴而行於手陽明大腸經足陽明胃經足太陰脾經手少陰心經手太陽小陽經足太陽膀胱經足少陰腎經手厥陰心包經手少陽三焦經足少陽膽經足厥陰肝經而又始於手太陰肺經蓋陰在內不在外陰主守內不主衛外紆折而若難升實無咎之不升也故營衛二氣人身並重未可重衛輕營也雷公曰善陳士鐸曰營衛原並重也世重衛而輕營者不知營衛也五臟互根篇雷公問於岐伯曰陽中有陰陰中有陽余既知之矣然論陰陽之變遷也未知陰中有陽陽中有陰亦有定位乎岐伯曰陰陽互相根也原無定位然求其位亦有定也肺開竅於鼻心開竅於舌脾開竅於口肝開竅於目腎開竅於耳厥陰與督脈會於巔此陽中有陰陰居陽位也肝與膽為表裡心與小腸為表裡腎與膀胱為表裡脾與胃為表裡肺與大腸為表裡包絡與三焦為表裡此陰中有陽陽居陰位也雷公曰請言互根之位岐伯曰耳屬腎而聽聲聲屬金是耳中有肺之陰也鼻屬肺而聞臭臭屬火是鼻中有心之陰也舌屬心而知肺味味屬土是舌中有脾之陰也目有五輪通貫五臟腦屬腎各會諸體是耳與腦有五臟之陰也大腸俞在脊十六椎旁胃俞在脊十二椎旁小腸俞在背第十八椎膽俞在脊十椎旁膀胱俞在中膂第二十椎三焦俞在腎俞之上脊第十三椎之旁包絡無俞寄於膈俞在上七椎之旁是七腑陽中有陰之位也惟各有位故其根生生不息也否則虛器耳何根之有哉雷公曰善陳士鐸曰陰中有陽陽中有陰無位而有位者以陰陽之有根也八風固本篇雷公問於岐伯曰八風出於天乎出於地乎抑出於人乎岐伯曰八風出於天地人身之五風合而成病人無五風天地之風不能犯也雷公曰請問八風之分天地也岐伯曰八風者春夏秋冬東西南北之風也春夏秋冬之風時令之風也屬於天東西南北之風方隅之風也屬於地然而地得天之氣風乃長天得地之氣風乃大是八風屬於天地可分而不可分也雷公曰人之五風何以合天地乎岐伯曰五風者心肝脾肺腎之風也五臟虛而風生矣以內風召外風天地之風始翕然相合五臟不虛內既無風外風何能入乎雷公曰風既入矣祛外風乎抑消內風乎岐伯曰風由內召不治內將何治乎雷公曰治內風而外風不散奈何岐伯曰內風不治外風益入安得散乎治臟固其本治風衛其標善治八風者也雷公曰何言之善乎請志之傳示來者陳士鐸曰小風之來皆外感也外感因於內招故單治內不可也單治外亦不可也要在分之中宜合合之中宜分也
