body:
  text: 八卷八風命名篇少俞問岐伯曰八風分春夏秋冬東西南北乎岐伯曰然少俞曰東西南北不止四風合之四時則八風不足以概之也岐伯曰風不止八而八風實足概之少俞曰何謂也岐伯曰風從東方來得春氣也風從東南來得春氣而兼夏氣矣風從南方來得夏氣也風從西南來得夏氣而兼秋氣矣風從西方來得秋氣也風從西北來得秋氣而兼冬氣矣風從北方來得冬氣也風從東北來得冬氣而兼春氣矣此方隅時令合而成八也少俞曰八風有名乎岐伯曰東風名和風也東南風名薰風也南風名熱風也西南風名溫風也西風名商風也西北風名涼風也北風名寒風也東北風名陰風也又方隅時令合而名之也少俞曰其應病何如乎岐伯曰和風傷在肝也外病在筋薰風傷在胃也外病在肌熱風傷在心也外病在脈溫風傷在脾也外病在腹商風傷在肺也外病在皮涼風傷在膀胱也外病在營衛寒風傷在腎也外病在骨陰風傷在大腸也外病在胸脅此方隅時令與臟腑相合而相感也然而臟腑內虛八風因得而中之邪之所湊其氣必虛非空言也少俞曰人有臟腑不虛而八風中之者又是何謂岐伯曰此暴風猝中不治而自愈也陳士鐸曰八風之來皆外感也外感因於內召故治內而外邪自散若外自病者不必治之太乙篇風后問於岐伯曰八風可以占疾病之吉凶乎岐伯曰天人一理也可預占以斷之風后曰占之不驗何也岐伯曰有驗有不驗者人事之不同耳天未嘗不可占也風后曰請悉言之岐伯曰八風休咎無日無時不可占也如風從東方來寅卯辰時則順否則逆矣逆則病風從北方來申酉戌時則順否則逆矣逆則病風從南方來巳午未時則順否則逆矣逆則病風從北方來亥子丑時則順否則逆矣逆則病風后曰豫聞古之占風也多以太乙之日為主天師曰無日無時不可占也恐不可為訓乎岐伯曰占風以太乙日決病所以驗不驗也風后曰舍太乙以占吉凶恐不驗更多耳岐伯曰公何以信太乙之深也風后曰太乙移日天必應之風雨風雨和則民安而病少風雨暴則民勞而病多太乙在冬至日有變占在君太乙在春分日有變占在相太乙在中宮日有變占在相吏太乙在秋分日有變占在將太乙在夏至日有變占在民所謂有變者太乙居五宮之日得非常之風也各以其所主占之生吉克凶多不爽也岐伯曰請言風雨之暴風后曰暴風南方來其傷人也內舍於心外在脈其氣主熱暴風西南方來其傷人也內舍於脾外在肌其氣主弱暴風西方來其傷人也內舍於肺外在皮膚其氣主燥暴風西北方來其傷人也內舍於小腸外在手太陽脈脈絶則溢脈閉則結不通善暴死其氣主清暴風從北方來其傷人也內舍於腎外在骨與肩背之膂筋其氣主寒暴風東北方來其傷人也內舍於大腸外在兩脅腋骨下及肢節其氣主溫暴風東方來其傷人也內舍於肝外在筋紐其氣主濕暴風東南方來其傷人也內合於胃外在肌肉其氣主重著言風而雨概之矣岐伯曰人見風輒病者豈皆太乙之移日乎執太乙以占風執八風以治病是泥於論風也夫百病皆始於風人之氣血虛餒風乘虛輒入矣何待太乙居宮哉陳士鐸曰人病全不在太乙說得淡而有味親陽親陰篇風后問於岐伯曰風與寒異乎岐伯曰異也曰何異乎岐伯曰風者八風也寒者寒氣也雖風未有不寒者要之風各異也風后曰風與寒有異入人臟腑亦有異乎岐伯曰風入風府寒不入風府也風后曰其義何居岐伯曰風陽邪寒陰邪陽邪主降陰邪主升主降者由風府之穴而入自上而下也主升者不由風府由臍之穴而入自下而上也風后曰陰邪不從風府入從何穴而入乎岐伯曰風府之穴陽經之穴也臍之穴陰經之穴也陽邪從陽而入故風入風門也陰邪從陰而入故寒入臍也陽親陽陰親陰此天地自然之道也風后曰風穴招風寒穴招寒風門風穴也宜風之入矣臍非寒穴也何寒從臍入乎岐伯曰臍非寒穴通於命門命門火旺則寒不能入命門火衰則腹內陰寒臍有不寒者乎陰寒之邪遂乘虛寒之隙奪臍而入矣奚論寒穴哉風后曰善陳士鐸曰陽邪入風府陰邪入臍各有道路也異傳篇雷公問曰各臟腑之病皆有死期有一日即死者有二三日死者有四五日死者有五六日至十餘日死者可晰言之乎岐伯曰病有傳經不傳經之異故死有先後也雷公曰請問傳經岐伯曰邪自外來內入臟腑必傳經也雷公曰請問不傳經岐伯曰正氣虛自病則不傳經也雷公曰移寒移熱即傳經之謂乎岐伯曰移即傳之義然移緩傳急雷公曰何謂乎岐伯曰移者臟腑自移傳者邪不欲在此腑而傳之彼臟也故移之勢緩而凶傳之勢急而暴其能殺人則一也雷公曰其傳經殺人若何岐伯曰邪入於心一日死邪入於肺三日傳於肝四日傳於脾五日傳於胃十日死邪入於肝三日傳於脾五日傳於胃十日傳於腎又三日邪散而愈否則死邪入於脾一日傳於胃二日傳於腎三日傳於膀胱十四日邪散而愈否則死邪入於胃五日傳於腎八日傳於膀胱又五日傳於小腸又二日傳於心則死邪入於腎三日傳於膀胱又三日傳於小腸又三日傳於心則死邪入於膀胱五日傳於腎又一日傳於小腸又一日傳於心則死邪入於膽五日傳於肺又五日傳於腎又五日傳於心則死邪入於三焦一日傳於肝三日傳於心則死邪入於胞絡一日傳於胃二日傳於膽三日傳於脾四日傳於腎五日傳於肝不愈則再傳再傳不愈則死邪入於小腸一日傳於膀胱二日傳於腎三日傳於包絡四日傳於胃五日傳於脾六日傳於肺七日傳於肝八日傳於膽九日傳於三焦十日傳於大腸十一日復傳於腎如此再傳不已則死邪入於大腸一日傳於小腸二日傳於三焦三日傳於肺四日傳於脾五日傳於肝六日傳於腎七日傳於心則死不傳心仍傳小腸則生也邪入於膽往往不傳故無死期可定然邪入於膽往往如見鬼神有三四日即死者此熱極自焚也雷公曰善陳士鐸曰移緩傳急確有死期可定最說得妙傷寒知變篇雷公問曰傷寒一日巨陽受之何以頭項痛腰脊強也岐伯曰巨陽者足太陽也其脈起於目內眥上額交巔入絡腦還出別下項循肩膊內挾脊抵腰中寒邪必先入於足太陽之經邪入足太陽則太陽之經脈不通為寒邪所據故頭項痛腰脊強也雷公曰二日陽明受之宜身熱目疼鼻乾不得臥矣而頭項痛腰脊強又何故歟岐伯曰此巨陽之餘邪未散也雷公曰太陽之邪未散宜不入陽明矣岐伯曰二日則陽明受之矣因邪留戀太陽未全入陽明故頭項尚痛腰脊尚強非二日陽明之邪全不受也雷公曰三日少陽受之宜胸脅痛耳聾矣邪宜出陽明矣既不入少陽而頭項腰脊之痛與強仍未除者又何故歟岐伯曰此邪不欲傳少陽轉回於太陽也雷公曰邪傳少陽矣宜傳入於三陰之經何以三日之後太陽之症仍未除也岐伯曰陽經善變且太陽之邪與各經之邪不同各經之邪循經而入太陽之邪出入自如有入有不盡入也惟不盡入故雖六七日而其症未除耳甚至七日之後猶然頭項痛腰脊強此太陽之邪乃原留之邪非從厥陰復出而傳之足太陽也雷公曰四日太陰受之腹滿嗌乾五日少陰受之口乾舌燥六日厥陰受之煩滿囊縮亦有不盡驗者何也岐伯曰陰經不變不變而變者邪過盛也雷公曰然則三陽三陰之經皆善變也變則不可以日數拘矣岐伯曰日數者言其常也公問者言其變也變而不失其常則變則可生否則死矣雷公曰兩感於寒者變乎岐伯曰兩感者越經之傳也非變也陳士鐸曰傷寒之文世人不知讀此論人能悟否無奈治傷寒者不能悟也傷寒同異篇雷公問於岐伯曰傷寒之病多矣可悉言之乎岐伯曰傷寒有六非冬傷於寒者舉不得謂傷寒也雷公曰請言其異岐伯曰有中風有中暑有中熱有中寒有中濕有中疫其病皆與傷寒異傷寒者冬月感寒邪入營衛由腑而傳於臟也雷公曰暑熱之症感於夏不感於三時似非傷寒矣風寒濕疫多感於冬日也何以非傷寒乎岐伯曰百病皆起於風四時之風每直中於臟腑非若傳經之寒由淺而深入也寒之中人自在嚴寒不由營衛直入臟腑是不從皮膚漸進非傳經之傷寒也水王於冬而冬日之濕反不深入以冬令收藏也他時則易感矣疫來無方四時均能中疫而冬疫常少二症俱不傳經皆非傷寒也雷公曰寒熱之不同也何熱病亦謂之傷寒乎岐伯曰寒感於冬則寒必變熱熱變於冬則熱即為寒故三時之熱病不可謂寒冬日之熱病不可謂熱是以三時之熱病不傳經冬日之熱病必傳經也雷公曰熱病傳經乃傷寒之類也非正傷寒也何天師著素問有熱病傳經之文而傷寒反無之何也岐伯曰類宜辨而正不必辨也知類即知正矣雷公曰善陳士鐸曰傳寒必傳經斷在嚴寒之時非冬日傷寒舉不可謂傷寒也辨得明說得出風寒殊異篇風后問於岐伯曰冬傷於寒與春傷於寒有異乎岐伯曰春傷於寒者風也非寒也風后曰風即寒也何異乎岐伯曰冬日之風則寒春日之風則溫寒傷深溫傷淺傷深者入少陽而傳裡傷淺者入少陽而出表故異也風后曰傳經乎岐伯曰傷冬日之風則傳傷春日之風則不傳也風后曰其不傳何也岐伯曰傷淺者傷在皮毛也皮毛屬肺故肺受之不若傷深者入於營衛也風后曰春傷於風頭痛鼻塞身亦發熱與冬傷於寒者何無異也岐伯曰風入於肺鼻為之不利以鼻主肺也肺既受邪肺氣不宣失清肅之令必移邪而入於太陽矣膀胱畏邪堅閉其經水道失行水不下泄火乃炎上頭即痛矣夫頭乃陽之首也既為邪火所據則一身之真氣皆與邪爭而身乃熱矣風后曰肺為胃之子肺受邪宜胃來援何以邪入肺而惡熱口渴之症生豈生肺者轉來刑肺乎岐伯曰胃為肺之母見肺子之寒必以熱救之夫胃之熱心火生之也胃得心火之生則胃土過旺然助胃必克肺矣火能刑金故因益而反損也風后曰嘔吐者何也岐伯曰此風傷於太陰也風在地中土必震動水泉上溢則嘔吐矣散風而土自安也風后曰風邪入太陽頭痛何以有痛不痛之殊也岐伯曰肺不移風於太陽則不痛耳風后曰風不入於太陽頭即不痛乎岐伯曰肺通於鼻鼻通於腦風入於肺自能引風入腦而作頭痛肺氣旺則風入於肺而不上走於腦故不痛也風后曰春傷於風往來寒熱熱結於裡何也岐伯曰冬寒入於太陽久則變寒春風入於太陽久則變熱寒則動傳於臟熱則靜結於腑寒在臟則陰與陽戰而發熱熱在腑則陽與陰戰而發寒隨臟腑之衰旺分寒熱之往來也風后曰傷風自汗何也岐伯曰傷寒之邪寒邪也傷風之邪風邪也寒邪入胃胃惡寒而變熱風邪入胃胃喜風而變溫溫則不大熱也得風以揚之火必外泄故汗出矣風后曰春傷於風下血譫語一似冬傷於寒之病何也岐伯曰此熱入血室非狂也傷於寒者熱自入於血室之中其熱重傷於風者風祛熱入於血室之內其熱輕也風后曰譫語而潮熱者何也岐伯曰其脈必滑者也風后曰何也岐伯曰風邪入胃胃中無痰則發大熱而譫語之聲高胃中有痰則發潮熱而譫語之聲低潮熱發譫語此痰也滑者痰之應也風后曰春傷於風發厥心下悸何也岐伯曰傷於寒者邪下行傷於風者邪上衝也寒乃陰邪陰則走下風乃陽邪陽則升上治寒邪先定厥後定悸治風邪先定悸後定厥不可誤也風后曰傷於風而發熱如見鬼者非狂乎岐伯曰狂乃實邪此乃虛邪也實邪從太陽來也邪熾而難遏虛邪從少陰來也邪旺而將衰實邪火逼心君而外出神不守於心也虛邪火引肝魂而外遊魄不守於肺也風后曰何論之神乎吾無測師矣陳士鐸曰風與寒殊故論亦殊人當細觀之陰寒格陽篇盤盂問於岐伯曰大小便閉結不通飲食輒吐面赭唇焦飲水亦嘔脈又沉伏此何症也岐伯曰腎虛寒盛陰格陽也盤盂曰陰何以格陽乎岐伯曰腎少陰經也惡寒喜溫腎寒則陽無所附升而不降矣盤盂曰其故何也岐伯曰腎中有水火存焉火藏水中水生火內兩相根而兩相制也邪入則水火相離而病生矣盤盂曰何邪而使之離乎岐伯曰寒熱之邪皆能離之而寒邪為甚寒感之輕則腎中之虛陽上浮不至格拒之至也寒邪太盛拒絶過堅陽杜陰而力衰陰格陽而氣旺陽不敢居於下焦沖逆於上焦矣上焦沖逆水穀入喉安能下入於胃乎盤盂曰何以治之岐伯曰以熱治之盤盂曰陽宜陰折熱宜寒折今陽在上而作熱不用寒反用熱不治陰反治陽豈別有義乎岐伯曰上熱者下逼之便熱也陽升者陰祛之使升也故上熱者下正寒也以陰寒折之轉害之矣故不若以陽熱之品順其性而從治之則陽回而陰且交散也盤盂曰善陳士鐸曰陰勝必須陽折陽勝必須陰折皆從治之法也春溫似疫篇風后問於岐伯曰春日之疫非感風邪成之乎岐伯曰疫非獨風也春日之疫非風而何風后曰然則春溫即春疫乎岐伯曰春疫非春溫也春溫有方而春疫無方也風后曰春疫無方何其疾之一似春溫也岐伯曰春溫有方而時氣亂之則有方者變而無方故與疫氣正相同也風后曰同中有異乎岐伯曰疫氣熱中藏殺時氣熱中藏生風后曰熱中藏生何多死亡乎岐伯曰時氣者不正之氣也臟腑聞正氣而陰陽和聞邪氣而陰陽亂不正之氣即邪氣也故聞之而輒病轉相傳染也風后曰聞邪氣而不病者又何故歟岐伯曰臟腑自和邪不得而亂之也春溫傳染亦臟腑之虛也風后曰臟腑實而邪遠臟腑空而邪中不洵然乎陳士鐸曰溫似疫症不可謂溫即是疫辨得明爽
