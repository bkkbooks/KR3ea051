body:
  text: 三卷膽腑命名篇胡孔甲問於岐伯曰大腸者白腸也小腸者赤腸也膽非腸何謂青腸乎岐伯曰膽貯青汁有入無出然非腸何能通而貯之乎故亦以腸名之青者木之色膽屬木其色青故又名青腸也胡孔甲曰十一臟取決於膽是腑亦有臟名矣何臟分五而腑分七也岐伯曰十一臟取決於膽乃省文耳非腑可名臟也孔甲曰膽即名為臟而十一臟取決之固何所取之乎岐天師曰膽司滲凡十一臟之氣得阻氣滲之則分清化濁有奇功焉孔甲曰膽有入無出是滲主入而不主出也何能化濁乎岐伯曰清滲入則濁自化濁自化而清亦化矣孔甲曰清滲入而能化是滲入而仍滲出矣岐伯曰膽為清淨之府滲入者清氣也遇清氣之臟腑亦以清氣應之應即滲之機矣然終非滲也孔甲曰臟腑皆取決於膽何臟腑受膽之滲乎岐伯曰大小腸膀胱皆受之而膀胱獨多焉雖然膀胱分膽之滲而膽之氣虛矣膽虛則膽得滲之禍矣故膽旺則滲益膽虛則滲損孔甲曰膽滲何氣則受損乎岐伯曰酒熱之氣膽之所畏也過多則滲失所司膽受損矣非毒結於腦則涕流於鼻也孔甲曰何以治之岐伯曰刺膽絡之穴則病可已也孔甲曰善陳士鐸曰膽主滲十一臟皆取決於膽者正決於滲也膽不能滲又何取決乎任督死生篇雷公問曰十二經脈之外有任督二脈何略而不言也岐伯曰二經之脈不可略也以二經散見於各經故言十二經脈而二經已統會於中矣雷公曰試分言之岐伯曰任脈行胸之前督脈行背之後也任脈起於中極之下以上毛際循腹裡上關元至咽嚨上頤循面入目眥此任脈之經絡也督脈起於少腹以下骨中央女子入系廷孔在溺孔之際其絡循陰器合纂間繞纂後即前後二陰之間也別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦至鼻柱還出別下項循肩膊俠脊抵腰中入循膂絡腎其男子循莖下至纂與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央此督脈之經絡也雖督脈止於齦交任脈止於承漿其實二脈同起於會陰止於齦交者未嘗不過承漿止於承漿者未嘗不過齦交行於前者亦行於後行於後者亦行於前循環周流彼此無間故任督分之為二合之仍一也夫會陰者至陰之所也任脈由陽行於陰故脈名陰海督脈由陰行於陽故脈名陽海非齦交穴為陽海承漿穴為陰海也陰交陽而陰氣生陽交陰而陽氣生任督交而陰陽自長不如海之難量乎故以海名之雷公曰二經之脈絡豫已知之矣請問其受病何如岐伯曰二經氣行則十二經之氣通二經氣閉則十二經之氣塞男則成疝女則成瘕非遺溺即脊強也雷公曰病止此乎岐伯曰腎之氣必假道於任督二經氣閉則腎氣塞矣女不受妊男不射精人道絶矣然則任督二經之脈絡即人死生之道路也雷公曰神哉論也請載外經以補內經未備陳士鐸曰任督之路實人生死之途説得精好入神陰陽二蹻篇司馬問曰奇經八脈中有陰蹻陽蹻之脈可得聞乎岐伯曰內經言之矣司馬曰內經言之治病未驗或有未全歟岐伯曰內經約言之實未全也陰蹻脈足少陰腎經之別脈也起於然骨之照海穴出內踝上又直上之循陰股以入於陰上循胸裡入於缺盆上出人迎之前入於目下鳩屬於目眥之睛明穴合足太陽膀胱之陽蹻而上行此陰蹻之脈也陽蹻脈足太陽膀胱之別脈也亦起於然骨之下申脈穴出外踝下循僕參郤於附陽與足少陽會於居髎又與手陽明會於肩髃及巨骨又與手太陽陽維會於臑俞與手足陽明會於地倉及巨髎與任脈足陽明會於承泣合足少陰腎經之陰蹻下行此陽蹻之脈也然而蹻脈之起止陽始於膀胱而止於腎陰始於腎而止於膀胱此男子同然也若女子微有異男之陰蹻起於然骨女之陰蹻起於陰股男之陽蹻起於申脈女之陽蹻起於僕參知同而治同知異而療異則陽蹻之病不至陰緩陽急陰蹻之病不至陽緩陰急何不驗乎司馬公曰今而後陰陽二蹻之脈昭然矣陳士鐸曰二蜮之脈分諸男女內經微別人宜知之不可草草看過奇恆篇奢龍問於岐伯曰奇恆之腑與五臟並主藏精皆可名臟乎岐伯曰然奢龍曰腦髓骨脈膽女子胞既謂奇恆之腑不宜又名臟矣岐伯曰腑謂臟者以其能藏陰也陰者即腎中之真水也真水者腎精也精中有氣而腦髓骨脈膽女子胞皆能藏之故可名腑亦可名臟也奢龍曰修真之士何必留心於此乎岐伯曰人欲長生必知斯六義而後可以養精氣結聖胎者也奢龍曰女子有胞以結胎男子無胞何以結之岐伯曰女孕男不妊故胞屬之女子而男子未嘗無胞也男子有胞而後可以養胎息故修真之士必知斯六者至要者則胞與腦也腦為泥丸即上丹田也胞為神室即下丹田也骨藏髓脈藏血髓藏氣腦藏精氣血精髓盡升泥丸下降於舌由舌下華池由華池下廉泉玉英通於膽下貫神室世人多欲故血耗氣散髓竭精亡也苟知藏而不瀉即返還之道也奢龍曰六者宜藏何道而使之藏乎岐伯曰廣成子有言毋搖精毋勞形毋思慮營營非不瀉之謂乎奢龍曰命之矣陳士鐸曰腦髓骨脈膽女子胞非臟也非臟而以臟名之以其能藏也能藏故以臟名之人可失諸藏乎小絡篇應龍問於岐伯曰膜原與肌腠有分乎岐伯曰二者不同也應龍曰請問不同岐伯曰肌腠在膜原之外也應龍曰肌腠有脈乎岐伯曰肌腠膜原皆有脈也其所以分者正分於其脈耳肌腠之脈內連於膜原膜原之脈外連於肌腠應龍曰二脈乃表裡也有病何以分之岐伯曰外引小絡痛者邪在肌腠也內引小絡痛者邪在膜原也應龍曰小絡又在何所岐伯曰小絡在膜原之間也陳士鐸曰小絡一篇本無深文備載諸此以小絡異於膜原耳知膜原之異即知肌腠之異也肺金篇少師問曰肺金也脾胃土也土宜生金有時不能生金者謂何岐伯曰脾胃土旺而肺金強脾胃土衰而肺金弱又何疑乎然而脾胃之氣太旺反非肺金所喜者由於土中火氣之過盛也土為肺金之母火為肺金之賊生變為克烏乎宜乎少師曰金畏火克宜避火矣何又親火乎岐伯曰肺近火則金氣之柔者必銷矣然肺離火則金氣之頑者必折矣所貴微火以通薰肺也故土中無火不能生肺金之氣而土中多火亦不能生肺金之氣也所以烈火為肺之所畏微火為肺之所喜少師公曰善請問金木之生克岐伯曰肺金制肝木之旺理也而肝中火盛則金受火炎肺失清肅之令矣避火不暇敢制肝木乎即木氣空虛已不畏肺金之刑況金受火制則肺金之氣必衰肝木之火愈旺勢必橫行無忌侵伐脾胃之土所謂欺子弱而凌母強也肺之母家受敵御木賊之強橫奚能顧金子之困窮肺失化源益加弱矣肺弱欲其下生腎水難矣水無金生則水不能制火毋論上焦之火焚燒而中焦之火亦隨之更熾甚且下焦之火亦挾水沸騰矣少師曰何肺金之召火也岐伯曰肺金嬌臟也位居各臟腑之上火性上炎不發則已發則諸火應之此肺金之所以獨受厥害也少師曰肺為嬌臟易禁諸火之威逼乎金破不鳴斷難免矣何以自免於禍乎岐伯曰仍賴腎子之水以救之是以肺腎相親更倍於土金之相愛以土生金而金難生土肺生腎而腎能生肺晝夜之間肺腎之氣實彼此往來兩相通而兩相益也少師日金得水以解炎敬聞命矣然金有時而不畏火者何謂乎岐伯曰此論其變也少師曰請盡言之岐伯曰火爍金者烈火也火氣自微何以爍金非惟不畏火且侮火矣火難制金則金氣日旺肺成頑金過剛而不可犯於是肅殺之氣必來伐木肝受金刑力難生火火勢轉衰變為寒火奚足畏乎然而火過寒無溫氣以生土土又何以生金久之火寒而金亦寒矣少師曰善請問金化為水而水不生木者又何謂乎岐伯曰水不生木豈金反生木乎水不生木者金受火融之水也真水生木而融化之水剋木矣少師曰善陳士鐸曰肺不燥不成頑金肺過濕不成柔金以肺中有火也肺得火則金益肺失火則金損故金中不可無火亦不可有火也水火不旺金反得其宜也總不可使金之過旺耳肝木篇少師曰肝屬木木非水不養故腎為肝之母也腎衰則木不旺矣是肝木之虛皆腎水之涸也然而肝木之虛不全責腎水之衰者何故岐伯曰此肝木自郁也木喜疏泄遇風寒之邪拂抑之事肝輒氣鬱不舒肝鬱必下克脾胃制土有力則木氣自傷勢必求濟腎水水生木而鬱氣未解反助剋土之橫土怒水助轉來剋水肝不受腎之益腎且得土之損未有不受病者也腎既病矣自難滋肝木之枯肝無水養其鬱更甚郁甚而剋土愈力脾胃受傷氣難轉輸必求救於心火心火因肝木之郁全不顧心心失化源何能生脾胃之土乎於是憐土子之受傷不敢咎肝母之過逆反嗔肺金不制肝木乃出其火而克肺肺無土氣之生復有心火之克則肺金難以自存聽肝木之逆無能相制矣少師曰木無金制宜木氣之舒矣何以仍郁也岐伯曰木性曲直必得金制有成今金弱木強則肝寡於畏任郁之性以自肆土無可克水無可養火無可助於是木空受焚矣此木無金制而愈郁也所以治肝必解鬱為先郁解而肝氣自平何至剋土土無木克則脾胃之氣自易升騰自必忘克腎水轉生肺金矣肺金得脾胃二土之氣則金氣自旺令行清肅腎水無匱乏之憂且金強制木木無過旺肝氣平矣少師曰肝氣不平可以直折之乎岐伯曰肝氣最惡者郁也其次則惡不平不平之極即郁之極也故平肝尤尚解鬱少師曰其故何也岐伯曰肝氣不平肝中之火過旺也肝火過旺由肝木之塞也外閉內焚非爍土之氣即耗心之血矣夫火旺宜為心之所喜然溫火生心烈火逼心所以火盛之極可暫用寒涼以瀉肝火郁之極宜兼用舒泄以平肝也少師曰善陳士鐸曰木不鬱則不損肝木之郁即逆之之謂也人能解鬱則木得其平矣何郁之有腎水篇少師曰請問腎水之義岐伯曰腎屬水先天真水也水生於金故肺金為腎母然而肺不能竟生腎水也必得脾土之氣薰蒸肺始有生化之源少師曰土剋水者也何以生水岐伯曰土貪生金全忘剋水矣少師曰金生水而水養於金何也岐伯曰腎水非肺金不生肺金非腎水不潤蓋肺居上焦諸臟腑之火咸來相逼苟非腎水灌注則肺金立化矣所以二經子母最為關切無時不交相生亦無時不交相養也是以補腎者必須益肺補肺者必須潤腎始既濟而成功也少師曰腎得肺之生即得肺之損又何以養各臟腑乎岐伯曰腎交肺而肺益生腎則腎有生化之源山下出泉涓涓正不竭也腎既優渥乃分其水以生肝肝木之中本自藏火有水則木且生心無水則火且焚木木得水之濟則木能自養矣木養於水木有和平之氣自不剋土而脾胃得遂其升發之性則心火何至躁動乎自然水不畏火之炎乃上潤而濟心矣少師曰水潤心固是水火之既濟但恐火炎而水不來濟也岐伯曰水不潤心故木無水養也木無水養肝必乾燥火發木焚爍盡脾胃之液肺金救土之不能何暇生腎中之水水涸而肝益加燥腎無瀝以養肝安得餘波以灌心乎肝木愈橫心火愈炎腎水畏焚因不上濟於心此腎衰之故非所謂腎旺之時也少師曰腎衰不能濟心獨心受其損乎岐伯曰心無水養則心君不安乃遷其怒於肺金遂移其火以逼肺矣肺金最畏火炎隨移其熱於腎而腎因水竭水中之火正無所依得心火之相會翕然升木變出龍雷由下焦而騰中焦由中焦而騰上焦有不可止遏之機矣是五臟七腑均受其害寧獨心受損乎少師曰何火禍之酷乎岐伯曰非火多為害乃水少為炎也五臟有臟火七腑有腑火火到之所同氣相親故其勢易旺所異者水以濟之也而水止腎臟之獨有且水中又有火也水之不足安敵火之有餘此腎臟所以有補無瀉也少師曰各臟腑皆取資於水宜愛水而畏火矣何以多助火以增焰乎岐伯曰水少火多一見火發惟恐火之耗水竟來顧水誰知反害水乎此禍生於愛非惡水而愛火也少師曰火多水少瀉南方之火非即補北方之水乎岐伯曰水火又相根也無水則火烈無火則水寒火烈則陰虧也水寒則陽消也陰陽兩平必水火既濟矣少師曰火水既濟獨不畏土之侵犯乎岐伯曰土能剋水而土亦能生水也水得土以相生則土中出水始足以養肝木而潤各臟腑也第不宜過於生之則水勢汪洋亦能沖決堤岸水無土製變成洪水之逆流故水不畏土之克也少師曰善陳士鐸曰五行得水則潤失水則損況取資多而分散少乎故水為五行之所竊不可不多也説得水之有益有此可悟水矣心火篇少師曰心火君火也何故宜靜不宜動岐伯曰君主無為心為君火安可有為乎君主有為非生民之福也所以心靜則火息心動則火炎息則脾胃之土受其益炎則脾胃之土受其災少師曰何謂也岐伯曰脾胃之土喜溫火之養惡烈火之逼也溫火養則土有生氣而成活土烈火逼則土有死氣而成焦土矣焦火何以生余肺金乾燥必求濟於腎水而水不足以濟之也少師曰腎水本濟心火者也何以救之無裨乎岐伯曰人身之腎水原非有餘況見心火之太旺雖濟火甚切獨不畏火氣之爍乎故避火之炎不敢上升於心中也心無水濟則心火更烈其克肺益甚肺畏火刑必求援於腎子而腎子欲救援而無水又不忍肺母之凌爍不得不出其腎中所有傾國以相助於是水火兩騰升於上焦而與心相戰心因無水以克肺今見水不濟心火來助肺欲取其水而轉與火相合則火勢更旺於是肺不受腎水之益反得腎火之虐矣斯時肝經之木見肺金太弱亦出火以焚心明助腎母以稱於實報肺仇而加刃也少師曰何以解氛乎岐伯曰心火動極矣安其心而火可息也少師曰可用寒涼直折其火乎岐伯曰寒涼可暫用不可久用也暫用則火化為水久用則水變為火也少師曰斯又何故歟岐伯曰心火必得腎水以濟之也滋腎安心則心火永靜舍腎安心則心火仍動矣少師曰凡水火未有不相剋也而心腎水火何相交而相濟乎岐伯曰水不同耳腎中邪水最克心火腎中真水最養心火心中之液即腎內真水也腎之真水旺而心火安腎之真水衰而心火沸是以心腎交而水火既濟心腎開而水火未濟也少師曰心在上腎在下地位懸殊何以彼此樂交無間乎岐伯曰心腎之交雖胞胎導之實肝木介之也肝木氣通腎無阻隔肝木氣鬱心腎即閉塞也少師曰然則肝木以又何以養之岐伯曰腎水為肝木之母補腎即所以通肝木非水不旺火非木不生欲心液之不枯必肝血之常足欲肝血之不乏必腎水之常盈補肝木要不外補腎水也少師曰善陳士鐸曰心火君火也君心為有形之火可以水折不若腎中之火為無形之火也無形之火可以水養知火之有形無形而虛火實火可明矣
