body:
  text: 四卷脾土篇少師問曰脾為濕土土生於火是火為脾土之父母乎岐伯曰脾土之父母不止一火也心經之君火包絡三焦命門之相火皆生之然而君火之生脾土甚疏相火之生脾土甚切而相火之中命門之火尤為最親少師曰其故何歟岐伯曰命門盛衰即脾土盛衰命門生絶即脾土生絶也蓋命門為脾土之父母實關死生非若他火之可旺可微可有可無也少師曰命門火過旺多非脾土之宜又何故乎岐伯曰火少則土濕無發生之機火多則土乾有燥裂之害蓋脾為濕土土中有水命門者水中之火也火藏水中則火為既濟之火自無亢焚之禍與脾土相宜故火盛亦盛火衰亦衰火生則生火絶則絶也若火過於旺是火勝於水矣水不足以濟火乃未濟之火也火似旺而實衰假旺而非真旺也與脾土不相宜耳非惟不能生脾轉能耗土之生氣脾土無生氣則赤地乾枯欲化精微以潤各臟腑難矣且火氣上炎與三焦包絡之火直衝而上與心火相合火愈旺而土愈耗不成為焦火得乎少師曰焦土能生肺金乎岐伯日肺金非土不生今土成焦土中鮮潤澤之氣何以生金哉且不特不生金也更且嫁禍於肺矣蓋肺乏土氣之生又多火氣之逼金弱木強必至之勢也木強凌土而土敗更難生金肺金絶而腎水亦絶也水絶則木無以養木枯自焚益添火焰土愈加燥矣少師曰治何經以救之岐伯曰火之有餘水之不足也補水則火自息然而徒補水則水不易生補肺金之氣則水有化源不患乎無本也腎得水以制火則水火相濟火無偏旺之害此治法之必先補水也少師曰善陳士鐸曰脾土與胃土不同生脾土與胃土生不同雖生土在於火也然火各異生脾土必須於心生胃土必須於包絡心為君火包絡為相火也二火斷須補腎以水能生火耳胃土篇少師問曰脾胃皆土也有所分乎岐伯曰脾陰土也胃陽土也陰土逢火則生陽土必生於君火君火者心火也少師曰土生於火火來生土兩相親也豈胃土遇三焦命門之相火辭之不受乎岐伯曰相火與胃不相合也故相火得之而燔不若君火得之而樂也少師曰心包亦是相火何與胃親乎岐伯曰心包絡代君火以司令者也故心包相火即與君火無異此胃上之所以相親也少師曰心包代心之職胃土取資心包無異取資心火矣但二火生胃土則受益二火助胃火則受禍者何也岐伯曰胃土衰則喜火之生胃火盛則惡火之助也少師曰此又何故歟岐伯曰胃陽土宜弱不宜強少師曰何以不宜強也岐伯曰胃多氣多血之府其火易動動則燎原而不可制不特爍肺以殺子且焚心以害母矣且火之盛者水之涸也火沸上騰必至有焚林竭澤之虞爍腎水燒肝木其能免乎少師曰治之奈何岐伯曰火盛必濟之水然水非外水也外水可暫救以止炎非常治之法也必大滋其內水之匱內水者腎水也然而火盛之時滋腎之水不能瀉胃之火以火旺不易滅水衰難驟生也少師曰又將奈何岐伯曰救焚之法先瀉胃火後以水濟之少師曰五臟六腑皆藉胃氣為生瀉胃火不損各臟腑乎吾恐水未生腎先絶矣岐伯曰火不息則土不安先息火後濟水則甘霖優渥土氣升騰自易發生萬物此瀉胃正所以救胃是瀉火非瀉土也胃土有生機各臟腑豈有死法乎此救胃又所以救腎並救各臟腑也少師曰胃氣安寧肝木來克奈何岐伯曰肝來克胃亦因肝木之燥也木燥則肝氣不平矣不平則木鬱不伸上克胃土土氣自無生髮之機故調胃之法以平肝為重肝氣平矣又以補水為急水旺而木不再郁也惟是水不易旺仍須補肺金旺則生水水可養木金旺則制木木不剋土胃有不得其生髮之性者乎少師曰善陳士鐸曰胃土以養水為主養水者助胃也胃中有水則胃火不沸故補腎正所以益胃也可見胃火之盛由於腎水之衰補腎水正補胃土也故胃火可殺胃火宜培不可紊也包絡火篇少師曰心包之火無異心火其生克同乎岐伯曰言同則同言異則異心火生胃心包之火不止生胃也心火克肺心包之火不止克肺也少師曰何謂也岐伯曰心包之火生胃亦能死胃胃土衰得心包之火而土生胃火盛得心包之火而土敗土母既敗肺金之子何能生乎少師曰同一火也何生克之異岐伯曰心火陽火也其勢急而可避心包之火陰火也其勢緩而可親故心火之克肺一時之刑心包之克肺實久遠之害害生於刑者勢急而患未大害生於恩者勢緩而患漸深也少師曰可救乎岐伯曰亦在制火之有餘而已少師曰制之奈何岐伯曰心包陰火竊心之陽氣以自養亦必得腎之陰氣以自存心欲溫腎腎欲潤心皆先交心包以通之使腎水少衰心又分其水氣腎且供心火之不足安能分余惠以慰心包心包乾涸毋怪其害胃土也補腎水之枯則水足灌心而化液即足注心包而化津此不救胃正所以救胃也少師曰包絡之火可瀉乎岐伯曰胃土過旺必瀉心包之火然心包之火可暫瀉而不可久瀉也心包逼近於心瀉包絡則心火不寧矣少師曰然則奈何岐天師曰肝經之木包絡之母也瀉肝則心包絡之火必衰矣少師曰肝亦心之母也瀉肝而心火不寒乎岐天師曰暫瀉肝則包絡損其焰而不至於害心即久瀉肝則心君減其炎亦不至於害包絡猶勝於直瀉包絡也少師曰誠若師言瀉肝經之木可救急而不可圖緩請問善後之法岐伯曰水旺則火衰既濟之道也安能捨補腎水別求瀉火哉少師曰善陳士鐸曰包絡之火為相火相火宜補不宜瀉也宜補而用瀉必害心包矣三焦火篇少師曰三焦無形其火安生乎岐伯曰三焦稱腑虛腑也無腑而稱腑有隨寓為家之義故逢木則生逢火則旺即逢金逢土亦不相仇而相得總欲竊各臟腑之氣以自旺也少師曰三焦耗臟腑之氣宜為各臟腑之所絶矣何以反親之也岐伯曰各臟腑之氣非三焦不能通達上下故樂其來親而益之以氣即有偷竊亦安焉而不問也少師曰各臟腑樂與三焦相親然三焦樂與何臟腑為更親乎岐伯曰最親者膽木也膽與肝為表裡是肝膽為三焦之母即三焦之家也無家而寄生於母家不無府而有府乎然而三焦之性喜動惡靜上下同流不樂安居於母宅又不可謂肝膽之宮竟是三焦之府也少師曰三焦火也火必畏水何故與水親乎岐伯曰三焦之火最善制水非親水而喜入於水也蓋水無火氣之溫則水成寒水矣寒水何以化物故腎中之水得三焦之火而生膀胱之水得三焦之火而化火與水合實有既濟之歡也但恐火過於熱制水太甚水不得益而得損必有乾燥之苦也少師曰然則何以治之岐伯曰瀉火而水自流也少師曰三焦無腑瀉三焦之火何從而瀉之岐伯曰視助火之臟腑以瀉之即所以瀉三焦也少師曰善陳士鐸曰三焦之火附於臟腑臟腑旺而三焦旺臟腑衰而三焦衰故助三焦在於助各臟腑也瀉三焦火可置臟腑於不問乎然則二焦盛衰全在腑也膽木篇少師曰膽寄於肝而木必生於水腎水之生肝即是生膽矣豈另來生膽乎岐伯曰腎水生木必先生肝肝即分其水以生膽然肝與膽皆腎子也腎豈有疏於膽者乎惟膽與肝為表裡實手足相親無彼此之分也故腎水旺而肝膽同旺腎水衰而肝膽同衰非僅肝血旺而膽汁盈肝血衰而膽汁衰也少師曰然亦有腎水不衰膽氣自病者何也岐伯曰膽之汁主藏膽之氣主泄故喜通不喜塞也而膽氣又最易塞一遇外寒膽氣不通矣一遇內郁膽氣不通矣單補腎水不舒膽木則木中之火不能外泄勢必下克脾胃之土木土交戰多致膽氣不平非助火以刑肺必耗水以虧肝於是膽郁肝亦郁矣肝膽交郁其塞益甚故必以解鬱為先不可徒補腎水也少師曰肝膽同郁將獨解膽木之塞乎岐伯曰郁同而解鬱烏可異哉膽鬱而肝亦郁肝舒而膽亦舒舒膽之後濟之補水則水蔭木以敷榮木得水而調達既不絶肝之血有不生心之液者乎自此三焦得木氣以為根即包絡亦得膽氣以為助十二經無不取決於膽也何憂匱乏哉少師曰善陳士鐸曰肝膽同為表裡肝盛則膽盛肝衰則膽衰所以治膽以治肝為先肝易於郁而膽之易郁又寧與肝殊乎故治膽必治肝也膀胱水篇少師曰水屬陰膀胱之水謂之陽水何也岐伯曰膀胱之水水中藏火也膀胱無火水不化故以陽水名之膀胱腑中本無火也恃心腎二臟之火相通化水水始可藏而亦可泄夫火屬陽膀胱既通火氣則陰變為陽矣少師曰膀胱通心腎之火然親於腎而疏於心也心火屬陽膀胱亦屬陽陽不與陽親何也岐伯曰膀胱與腎為表裡最為關切故腎親於膀胱而膀胱亦不能疏於腎也心不與膀胱相合毋怪膀胱之疏心矣然心雖不合於膀胱而心實與小腸為表裡小腸與膀胱正相通也心合小腸不得不合膀胱矣是心與膀胱其跡若遠而實近也少師曰然則膀胱親於心而疏於腎乎岐伯曰膀胱陽水也喜通陰火而不喜通陽火似心火來親未必得之化水然而腎火不通心火則陰陽不交膀胱之陽火正難化也少師曰此又何故歟岐伯曰心火下交於腎則心包三焦之火齊來相濟助胃以化膀胱之水倘心不交腎心包三焦之火各奉心火以上炎何敢下降以私通於腎既不下降敢代君以化水乎少師曰君火無為相火有為君火不下降包絡相火正可代君出治何以心火不交相火亦不降乎岐伯曰君臣一德而天下治君火交而相火降則膀胱得火而水化君火離而相火降則膀胱得火而水乾雖君火恃相火而行亦相火必藉君火而治腎得心火之交又得包絡之降陰陽合為一性竟不能分腎為陰心為陽矣少師曰心腎之離合膀胱之得失如此乎岐伯曰膀胱可寒而不可過寒可熱而不可過熱過寒則遺過熱則閉皆心腎不交之故也此水火所以重既濟耳少師曰善陳士鐸曰膀胱本為水腑然水中藏火無水不交無火亦不交也故心腎二臟皆通於膀胱之腑膀胱不通又何交乎交心腎正藏水火也大腸金篇少師曰金能生水大腸屬金亦能生水乎岐伯曰大腸之金陽金也不能生水且藉水以相生少師曰水何能生金哉岐伯曰水不生金而能養金養即生也少師曰人身火多於水安得水以養大腸乎岐伯曰大腸離水實無以養而水苦無多所冀者脾土生金轉輸精液庶無乾燥之虞而後以腎水潤之便慶濡澤耳是水土俱為大腸之父母也少師曰土生金而大腸益燥何也岐伯曰土柔而大腸潤土剛而大腸燥矣少師曰土剛何以燥也岐伯曰土剛者因火旺而剛也土剛而生金更甚然未免同火俱生金喜土而畏火雖生而實克矣安得不燥哉少師曰水潤金也又善蕩金者何故歟岐伯曰大腸得真水而養得邪水而蕩也邪正不兩立勢必相遇而相爭邪旺而正不能敵則沖激澎湃傾腸而瀉矣故大腸尤宜防水防水者防外來之水非防內存之水也少師曰人非水火不生人日飲水何以防之岐伯曰防水何若培土乎土旺足以制水土旺自能生金制水不害邪水之侵生金無愁真水之涸自必火靜而金安可傳導而變化也少師曰大腸無火往往有傳導變化而不能者又何故歟岐伯曰大腸惡火又最喜火也惡火者惡陽火也喜火者喜陰火也陰火不同而腎中之陰火尤其所喜喜火者喜其火中之有水也少師曰腎火雖水中之火然而剋金何以喜之岐伯曰肺腎子母也氣無時不通肺與大腸為表裡腎氣生肺即生大腸矣大腸得腎中水火之氣始得司其開闔也倘水火不入於大腸開闔無權何以傳導變化乎少師曰善陳士鐸曰大腸無水火何以開合開合既難何以傳導變化乎可悟大腸必須於水火也大腸無水火之真即邪來犯之故防邪仍宜潤正耳小腸火篇少師曰小腸屬火乎屬水乎岐伯曰小腸與心為表裡與心同氣屬火無疑其體則為水之路故小腸又屬水也少師曰然則小腸居水火之間乃不陰不陽之腑乎岐伯曰小腸屬陽不屬陰也兼屬之水者以其能導水也水無火不化小腸有火故能化水水不化火而火且化水是小腸屬火明矣惟小腸之火代心君以變化心即分其火氣以與小腸始得導水以滲入於膀胱然有心之火氣無腎之水氣則心腎不交水火不合水不能遽滲於膀胱矣少師曰斯又何故乎岐伯曰膀胱水腑也得火而化亦必得水而親小腸之火欲通膀胱必得腎中真水之氣以相引而後心腎會而水火濟可滲入亦可傳出也少師曰小腸為受盛之官既容水穀安在腸內無水必藉腎水之通膀胱乎岐伯曰真水則存而不泄邪水則走而不守也小腸得腎之真水故能化水穀而分清濁不隨水穀俱出也此小腸所以必資於腎氣耳少師曰善陳士鐸曰小腸之火有水以濟之故火不上焚而水始下降也火不上焚者有水以引之也水不下降者有火以升之也有升有引皆既濟之道也命門真火篇少師曰命門居水火中屬水乎屬火乎岐伯曰命門火也無形有氣居兩腎之間能生水而亦藏於水也少師曰藏於水以生水何也岐伯曰火非水不藏無水則火沸矣水非火不生無火則水絶矣水與火蓋兩相生而兩相藏也少師曰命門之火既與兩腎相親宜與各臟腑疏矣岐伯曰命門為十二經之主不止腎恃之為根各臟腑無不相合也少師曰十二經皆有火也何藉命門之生乎岐伯曰十二經之火皆後天之火也後天之火非先天之火不化十二經之火得命門先天之火則生生不息而後可轉輸運動變化於無窮此十二經所以皆仰望於命門各倚之為根也少師曰命門之火氣甚微十二經皆來取資盡為分給不虞匱乏乎岐伯曰命門居水火中水火相濟取之正無窮也少師曰水火非出於腎乎岐伯曰命門水火雖不全屬於腎亦不全離乎腎也蓋各經之水火均屬後天獨腎中水火則屬先天也後天火易旺先天火易衰故命門火微必須補火而補火必須補腎又必兼水火補之正以命門之火可旺而不可過旺也火之過旺水之過衰也水衰不能濟火則火無所制必焚沸於十二經不受益而受損矣故補火必須於水中補之水中補火則命門與兩腎有既濟之歡分布於十二經亦無未濟之害也少師曰命門之系人生死甚重內經何以遺之岐伯曰未嘗遺也主不明則十二官危所謂主者正指命門也七節之旁有小心小心者亦指命門也人特未悟耳少師曰命門為主前人未言何也岐伯曰廣成子云窈窈冥冥其中有神恍恍惚惚其中有氣亦指命門也誰謂前人勿道哉且命門居於腎通於任督更與丹田神室相接存神于丹田所以溫命門也守氣於神室所以養命門也修仙之道無非溫養命門耳命門旺而十二經皆旺命門衰而十二經皆衰也命門生而氣生命門絶而氣絶矣少師曰善陳士鐸曰命門為十二經之主素問不明言者以主之難識耳然不明言者未嘗不顯言之也無知世人不悟耳經天師指示而命門絶而不絶矣秦火未焚之前何故修命門者少總由於不善讀內經也
