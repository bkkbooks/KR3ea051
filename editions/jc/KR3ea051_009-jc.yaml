body:
  text: 九卷補瀉陰陽篇雷公問於岐伯曰人身陰陽分於氣血內經詳之矣請問其餘岐伯曰氣血之要在氣血有餘不足而已氣有餘則陽旺陰消血不足則陰旺陽消雷公曰治之奈何岐伯曰陽旺陰消者當補其血陰旺陽消者當補其氣陽旺陰消者宜瀉其氣陰旺陽消者宜瀉其血無不足無有餘則陰陽平矣雷公曰補血則陰旺陽消不必再瀉其氣補氣則陽旺陰消不必重瀉其血也岐伯曰補血以生陰者言其常補陰也瀉氣以益陰者言其暫瀉陽也補氣以助陽者言其常補陽也瀉血以救陽者言其暫瀉陰也故新病可瀉久病不可輕瀉也久病宜補新病不可純補也雷公曰治血必當理氣乎岐伯曰治氣亦宜理血也氣無形血有形無形生有形者變也有形生無形者常也雷公曰何謂也岐伯曰變治急常治緩勢急不可緩亟補氣以生血勢緩不可急徐補血以生氣雷公曰其故何也岐伯曰氣血兩相生長非氣能生血血不能生氣也第氣生血者其效速血生氣者其功遲宜急而亟者治失血之驟也宜緩而徐者治失血之後也氣生血則血得氣而安無憂其沸騰也血生氣則氣得血而潤無虞其乾燥也苟血失補血則氣且脫矣血安補氣則血反動矣雷公曰善陳士鐸曰氣血俱可補也當於補中尋其原不可一味呆補為妙善養篇雷公問於岐伯曰春三月謂之發陳夏三月謂之蕃秀秋三月謂之容平冬三月謂之閉藏天師詳載四氣調神大論中然調四時則病不生不調四時則病必作所謂調四時者調陰陽之時令乎抑調人身陰陽之氣乎願晰言之岐伯曰明乎哉問也調陰陽之氣在人不在時也春三月調木氣也調木氣者順肝氣也夏三月調火氣也調火氣者順心氣也秋三月調金氣也調金氣者順肺氣也冬三月調水氣也調水氣者順腎氣也肝氣不順逆春氣矣少陽之病應之心氣不順逆夏氣矣太陽之病應之肺氣不順逆秋氣矣太陰之病應之腎氣不順逆冬氣矣少陰之病應之四時之氣可不調乎調之實難以陰陽之氣不易調也故人多病耳雷公曰人既病矣何法療之岐伯曰人以胃氣為本四時失調致生疾病仍調其胃氣而已胃調脾自調矣脾調而肝心肺腎無不順矣雷公曰先時以養陰陽又何可不講乎岐伯曰陽根於陰陰根於陽養陽則取之陰也養陰則取之陽也以陽養陰以陰養陽貴養之於豫也何邪能幹乎閉目塞兌內觀心腎養陽則漱津送入心也養陰則漱津送入腎也無他異法也雷公曰善天老問曰陰陽不違背而人無病養陽養陰之法止調心腎乎岐伯曰內經一書皆養陽養陰之法也天老曰陰陽之變遷不常養陰養陽之法又烏可執哉岐伯曰公言何善乎奇恆之病必用奇恆之法療之豫調心腎養陰陽於無病時也然而病急不可緩病緩不可急亦視病如何耳故不宜汗而不汗所以養陽也宜汗而急汗之亦所以養陽也不宜下而不下所以養陰也宜下而大下之亦所以養陰也豈養陽養陰專尚補而不尚攻乎用攻於補之中正善於攻也用補於攻之內正善於補也攻補兼施養陽而不損於陰養陰而不損於陽庶幾善於養陰陽者乎天老曰善陳士鐸曰善養一篇俱非泛然之論不可輕用攻補也亡陽亡陰篇鳥師問岐伯曰人汗出不已皆亡陽也岐伯曰汗出不已非盡亡陽也鳥師曰汗症未有非熱也熱病即陽病矣天師謂非陽何也岐伯曰熱極則陽氣難固故汗泄亡陽溺屬陰汗屬陽陽之外泄非亡陽而何謂非盡亡陽者以陽根於陰也陽之外泄由於陰之不守也陰守其職則陽根於陰陽不能外泄也陰失其職則陰欲自顧不能又何能攝陽氣之散亡乎故陽亡本於陰之先亡也鳥師曰陰亡則陰且先脫何待陽亡而死乎岐伯曰陰陽相根無寸晷之離也陰亡而陽隨之即亡故陽亡即陰亡也何分先後乎鳥師曰陰陽同亡宜陰陽之共救矣乃救陽則汗收而可生救陰則汗止而難活又何故乎岐伯曰陰生陽則緩陽生陰則速救陰而陽之絕不能遽回救陽而陰之絕可以驟復故救陰不若救陽也雖然陰陽何可離也救陽之中附以救陰之法則陽回而陰亦自復也鳥師曰陰陽之亡非旦夕之故也曷不於未亡之前先治之岐天師曰大哉言乎亡陰亡陽之症皆腎中水火之虛也陽虛補火以生水陰虛補水以制火可免兩亡矣鳥師曰善陳士鐸曰陰陽之亡由於陰陽之兩不可守也陽攝於陰陰攝於陽本於水火之虛虛則亡又何疑哉晝夜輕重篇雷公問於歧伯曰晝夜可辨病之輕重乎岐伯曰病有重輕宜從晝夜辨之雷公曰辨之維何岐伯曰陽病晝重陰病晝輕陽病夜輕陰病夜重雷公曰何謂也岐伯曰晝重夜輕陽氣旺於晝衰於夜也晝輕夜重陰氣旺於夜衰於晝也雷公曰陽病晝輕陰病夜輕何故乎岐伯曰此陰陽之氣虛也雷公曰請顯言之岐伯曰陽病晝重夜輕此陽氣與病氣交旺陽氣未衰也正與邪鬥尚有力也故晝反重耳夜則陽衰矣陽衰不與邪鬥邪亦不與正鬥故夜反輕耳陰病晝輕夜重此陰氣與病氣交旺陰氣未衰也正與邪爭尚有力也故夜反重耳晝則陰衰矣陰衰不敢與邪爭邪亦不與陰爭故晝反輕耳雷公曰邪既不與正相戰宜邪之退舍矣病猶不瘥何也岐伯曰重乃真重輕乃假輕假輕者視之輕而實重邪且重入矣烏可退哉且輕重無常或晝重夜亦重或晝輕夜亦輕或時重時輕此陰陽之無定晝夜之難拘也雷公曰然則何以施療乎岐伯曰晝重夜輕者助陽氣以祛邪晝輕夜重者助陰氣以祛邪皆不可專祛其邪也晝夜俱重晝夜俱輕與時重時輕峻於補陰佐以補陽又不可泥於補陽而專於祛邪也陳士鐸曰晝夜之間輕重自別解陽解陰篇奢龍問於岐伯曰陽病解於戍陰病解於寅何也岐伯曰陽病解於戍者解於陰也陰病解於寅者解於陽也然解於戍者不始於戍解於寅者不始於寅不始於戍者由寅始之也不始於寅者由亥始之也解於戍而始於寅非解於陰乃解於陽也解於寅而始於亥非解於陽乃解於陰也奢龍曰陽解於陽陰解於陰其義何也岐伯曰十二經均有氣王之時氣王則解也奢龍曰十二經之王氣可得聞乎岐伯曰少陽之氣王寅卯辰太陽之氣王巳午未陽明之氣王申酉戍太陰之氣王亥子醜少陰之氣王子醜寅厥陰之氣王醜寅卯也奢龍曰少陰之王何與各經殊乎岐伯曰少陰者腎水也水中藏火火者陽也子時一陽生丑時二陽生寅時三陽生陽進則陰退故陰病遇子醜寅而解者解於陽也奢龍曰少陰解於陽非解於陰矣岐伯曰天一生水子時水生即是王地故少陰遇子而漸解也奢龍曰少陽之解始於寅卯產陰厥陰之解終於寅卯又何也岐伯曰寅為生人之首卯為天地門戶始於寅卯者陽得初之氣也終於寅卯者陰得終之氣也奢龍曰三陽之時王各王三時三陰之時王連王三時又何也岐伯曰陽行健其道長故各王其時陰行鈍其道促故連王其時也奢龍曰陽病解於夜半陰病解於日中豈陽解於陽陰解於陰乎岐伯曰夜半以前者陰也夜半以後者陽也日中以後者陰也日中以前者陽也陽病必於陽王之時先現解之機至夜半而盡解也陰病必於陰王之時先現解之兆至日中而盡解也雖陽解於陽實陽得陰之氣也雖陰解於陰實陰得陽之氣也此陽根陰陰根陽之義耳奢龍曰善陳士鐸曰陽解於陰陰解於陽自有至義非泛說也真假疑似篇雷公問曰病有真假公言之矣真中之假假中之真未言也岐伯曰寒熱虛實盡之雷公曰寒熱若何岐伯曰寒乃假寒熱乃真熱內熱之極外現假寒之象此心火之亢也火極似水治以寒則解矣熱乃假熱寒乃真寒下寒之至上發假熱之形此腎火之微也水極似火治以熱則解矣雷公曰虛實若何岐伯曰虛乃真虛實乃假實清肅之令不行飲食難化上越中滿此脾胃假實肺氣真虛也補虛則實消矣實乃真實虛乃假虛疏泄之氣不通風邪相侵外發寒熱此肺氣假虛肝氣真實也治實則虛失矣雷公曰盡此乎岐伯曰未也有時實時虛時寒時熱狀真非真狀假非假此陰陽之變水火之絕也雷公曰然則何以治之岐伯曰治之早則生治之遲則死雷公曰將何法早治之岐伯曰救胃腎之氣則絕者不絕變者不變也雷公曰水火各有其假而火尤難辨奈何岐伯曰真火每現假寒假火每現真熱然辨之有法也真熱者陽症也真熱現假寒者陽症似陰也此外寒內熱耳真寒者陰症也真寒現假熱者陰症似陽也此外熱內寒耳雷公曰外寒內熱外熱內寒水火終何以辨之岐伯曰外寒內熱者真水之虧邪氣之勝也外熱內寒者真火之虧正氣之虛也真水真火腎中水火也腎火得腎水以相資則火為真火熱為真熱腎火離腎水以相制則火為假火熱成假熱矣辨真辨假以外水試之真熱得水則解假熱得水則逆也雷公曰治法若何岐伯曰補其水則假火自解矣雷公曰假熱之症用熱劑而瘥者何也岐伯曰腎中之火喜陰水相濟亦喜陰火相引滋其水矣用火引之則假火易藏非舍水竟用火也雷公曰請言治火之法岐伯曰補真水則真火亦解也雖然治火又不可純補水也祛熱於補水之中則假破真現矣雷公曰善陳士鐸曰不悟真何知假不悟假何知真真假之間亦水火之分也識破水火之真假則真假何難辨哉從逆窺源篇應龍問曰病有真假症有從逆予知之矣但何以辨其真假也岐伯曰寒熱之症氣順者多真氣逆者多假凡氣逆者皆假寒假熱也知其假無難治真矣應龍曰請問氣逆者何症也岐伯曰真陰之虛也應龍曰真陰之虛何遂成氣逆乎岐伯曰真陰者腎水也腎水之中有火存焉火得水而伏火失水而飛凡氣逆之症皆陰水不能制陰火也應龍曰予聞陰陽則兩相配也未聞陰與陰而亦合也岐伯曰人身之火不同有陰火陽火陽火得陰水而制者陰陽之順也陰火得陰水而伏者陰陽之逆也應龍曰陰陽逆矣何以伏之岐伯曰此五行之顛倒也逆而伏者正順而制之也應龍曰此則龍之所不識也岐伯曰腎有兩歧水火藏其內無火而水不生無水而火不長不可離也火在水中故稱陰火其實水火自分陰陽也應龍曰陰火善逆陰水亦易逆何故岐伯曰此正顯水火之不可離也火離水而逆水離火而亦逆也應龍曰水火相離者又何故歟岐伯曰人節欲少而縱恣多過泄其精則陰水虧矣水虧則火旺水不能制火而火逆矣應龍曰泄精損水宜火旺不宜火衰也何火有時而寒乎岐伯曰火在水中水泄而火亦泄也泄久則陰火虧矣火虧則水寒火不能生水而水逆也故治氣逆者皆以補腎為主水虧致火逆者補腎則逆氣自安火虧致水逆者補腎而逆氣亦安應龍曰不足宜補有餘宜瀉亦其常也何治腎之水火不尚瀉尚補乎岐伯曰腎中水火各臟腑之所取資也故可補不可瀉而水尤不可瀉也各臟腑有火無水皆腎水滋之一瀉水則各臟腑立槁矣氣逆之症雖有水火之分而水虧者多也故水虧者補水而火虧者亦必補水蓋水旺則火衰水生則火長也應龍曰補水而火不衰補水而火不長又奈何岐伯曰補水以衰火者益水之藥宜重補水以長火者益水之藥宜輕也應龍曰善陳士鐸曰人身之逆全在腎水之不足故補逆必須補水水足而逆者不逆也移寒篇應龍問曰腎移寒於脾脾移寒於肝肝移寒於心心移寒於肺肺移寒於腎此五臟之移寒也脾移熱於肝肝移熱於心心移熱於肺肺移熱於腎腎移熱於脾此五臟之移熱也五臟有寒熱之移六腑有移熱無移寒何也岐伯曰五臟之五行正也六腑之五行副也五臟受邪獨當其勝六腑受邪分受其殃且臟腑之病熱居什之八寒居什之二也寒易回陽熱難生陰故熱非一傳而可止臟傳未已又傳諸腑腑又相傳寒則得溫而解在臟有不再傳者臟不遍傳何至再傳於腑乎此六腑所以無移寒之證也應龍曰寒不移於腑獨不移於臟乎岐伯曰寒入於腑而傳於腑甚則傳於臟此邪之自傳也非移寒之謂也應龍曰移之義若何岐伯曰本經受寒虛不能受移之於他臟腑此邪不欲去而去之嫁其禍也應龍曰善陳士鐸曰六腑有移熱而無移寒以寒之不移也獨說得妙非無徵之文寒熱舒肝篇雷公問曰病有寒熱皆成於外邪乎岐伯曰寒熱不盡由於外邪也雷公曰斯何故歟岐伯曰其故在肝肝喜疏泄不喜閉藏肝氣鬱而不宣則膽氣亦隨之而鬱膽木氣鬱何以生心火乎故心之氣亦郁也心氣鬱則火不遂其炎上之性何以生脾胃之土乎土無火養則土為寒土無發生之氣矣肺金無土氣之生則其金不剛安有清肅之氣乎木寡於畏反克脾胃之土土欲發舒而不能土木相刑彼此相角作寒作熱之病成矣正未嘗有外邪之干乃五臟之鬱氣自病徒攻其寒而熱益盛徒解其熱而寒益猛也雷公曰合五臟以治之何如岐伯曰舒肝木之郁諸郁盡舒矣陳士鐸曰五郁發寒熱不止木鬱也而解鬱之法獨責於木以木鬱解而金土水火之郁盡解故解五郁惟尚解木鬱也不必逐經解之嘉慶貳拾年靜樂堂書
