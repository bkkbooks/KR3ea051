body:
  text: 二卷媾精受妊篇雷公問曰男女媾精而受妊者何也岐伯曰骨為作強之官故受妊而生人也雷公曰作強而何以生人也岐伯曰生人者即腎之技巧也雷公曰技巧屬腎之水乎火乎岐伯曰水火無技巧也雷公曰離水火又何以出技巧乎岐伯曰技巧成於水火之氣也雷公曰同是水火之氣何生人有男女之別乎岐伯曰水火氣弱則生女水火氣強則生男雷公曰古云女先泄精則成男男先泄精則成女今曰水火氣弱則生女水火氣強則生男何也岐伯曰男女俱有水火之氣也氣同至則技巧出焉一有先後不成胎矣男泄精女泄氣女子泄精則氣脫矣男子泄氣則精脫矣烏能成胎雷公曰女子不泄精男不泄氣何以受妊乎岐伯曰女氣中有精男精中有氣女泄氣而交男子之精男泄精而合女子之氣此技巧之所以出也雷公曰所生男女有強有弱自分於父母之氣矣但有清濁壽夭之異何也岐伯曰氣清則清氣濁則濁氣長則壽氣促則夭皆本於父母之氣也雷公曰生育本於腎中之氣余已知之矣但此氣也豫於五臟七腑之氣乎岐伯曰五臟七腑之氣一經不至皆不成胎雷公曰媾精者動腎中之氣也與五臟七腑何豫乎岐伯曰腎藏精亦藏氣藏精者藏五臟七腑之精也藏氣者藏五臟七腑之氣也藏則俱藏泄則俱泄雷公曰泄氣者亦泄血乎岐伯曰精即血也氣無形血有形無形化有形有形不能化無形也雷公曰精非有形乎岐伯曰精雖有形而精中之氣正無形也無形隱於有形故能靜能動動則化耳化則技巧出矣雷公曰微哉言乎請傳之奕祀以彰化育焉陳士鐸曰男女不媾精斷不成胎胎成於水火之氣此氣即男女之氣也氣藏於精中精雖有形而實無形也形非氣乎故成胎即成氣之謂社生篇少師問曰人生而白頭何也岐伯曰社日生人皮毛皆白非止鬢髮之白也少師曰何故乎岐伯曰社日者金日也皮毛須鬢皆白者得金之氣也少師曰社日非金也天師謂之金日此余之未明也岐伯曰社本土也氣屬金社日生人犯金之氣金氣者殺氣也少師曰人犯殺氣宜夭矣何又長年乎岐伯曰金中有土土乃生氣也人肺屬金皮毛亦屬金金之殺氣得土則生逢金則鬥社之金氣伐人皮毛不入人臟腑故得長年耳少師曰社日生人皮毛鬢髮不盡白者又何故歟岐伯曰生時不同也少師曰何時乎岐伯曰非巳午時必辰戌丑未時也少師曰巳午火也火能制金之氣宜矣辰戌丑未土也不助金之氣乎岐伯曰社本土也喜生惡泄得土則生生則不克矣少師曰同是日也何社日之凶如是乎岐伯曰歲月日時俱有神司之社日之神與人最親其性最喜潔也生產則穢矣兩氣相感兒身受之非其煞之暴也少師曰人生有記赤如朱青如靛黑如鍋白如雪終身不散何也豈亦社日之故乎岐伯曰父母交媾偶犯遊神為神所指誌父母之過也少師曰色不同者何歟岐伯曰隨神之氣異也少師曰記無黃色者何也岐伯曰黃乃正色人犯正神不相校也故亦不相指不相指故罔所記耳陳遠公曰社日生人說來有源有委非孟浪成文者可比天厭火衰篇容成問曰世有天生男子音聲如女子外勢如嬰兒此何故歟岐伯曰天厭之也容成曰天何以厭之乎岐伯曰天地有缺陷安得人盡皆全乎容成曰天未嘗厭人奈何以天厭名之岐伯曰天不厭而人必厭也天人一道人厭即天厭矣容成曰人何不幸成天厭也岐伯曰父母之咎也人道交感先火動而後水濟之火盛者生子必強火衰者生子必弱水盛者生子必肥水衰者生子必瘦天厭之人乃先天之火微也容成曰水火衰盛分強弱肥瘦宜也不宜外陽之細小岐伯曰腎中之火先天之火無形之火也腎中之水先天之水無形之水也火得水而生水得火而長言腎內之陰陽也水長火則水為火之母火生水則火為水之母也人得水火之氣以生身則水火即人之父母也天下有形不能生無形也無形實生有形外陽之生實內陽之長也內陽旺而外陽必伸內陽旺者得火氣之全也內陽衰矣外陽亦何得壯大哉容成曰火即不全何以生身乎岐伯曰孤陰不生孤陽不長天厭之人但火不全耳未嘗無陰陽也偏於火者陽有餘而陰不足偏於水者陰有餘而陽不足也陽既不足即不能生厥陰之宗筋此外陽之所以屈而不伸也毋論剛大矣容成曰善陳遠公曰外陽之大小視水火之偏全不視陰陽之有無耳說來可聽經脈相行篇雷公問曰帝問脈行之逆順若何余無以奏也願天師明教以聞岐伯曰十二經脈有自上行下者有自下行上者各不同也雷公曰請悉言之岐伯曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹此上下相行之數也雷公曰尚未明也岐伯曰手之三陰太陰肺少陰心厥陰包絡也手太陰從中府走大指之少商手少陰從極泉走小指之少衝手厥陰從天池走中指之中衝皆從臟走手也手之三陽陽明大腸太陽小腸少陽三焦也手陽明從次指商陽走頭之迎香手太陽從小指少澤走頭之聽宮手少陽從四指關衝走頭之絲竹空皆從手走頭也足之三陽太陽膀胱陽明胃少陽膽也足太陽從頭晴明走足小指之至陰足陽明從頭頭維走足次指之厲兌足少陽從頭前關走四指之竅陰皆從頭走足也足之三陰太陰脾少陰腎厥陰肝也足太陰從足大指內側隱白走腹之大包足少陰從足心湧泉走腹之俞府足厥陰從足大指外側大敦走腹之期門皆從足走腹也雷公曰逆順若何岐伯曰手之陰經走手為順走臟為逆也手之陽經走頭為順走手為逆也足之陰經走腹為順走足為逆也足之陽經走足為順走頭為逆也雷公曰足之三陰皆走於腹獨少陰之脈下行何也豈少陰經易逆難順乎岐伯曰不然夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精下注少陰之大絡出於氣衝循陰陽內廉入膕中伏行胻骨內下至內踝之後屬而別其下者並由少陰經滲三陰其在前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉故別絡邪結則跗上脈不動不動則厥厥則足寒矣此足少陰之脈少異於三陰而走腹則一也雷公曰其少異於三陰者為何岐伯曰少陰腎經中藏水火不可不曲折以行其脈不若肝脾之可直行於腹也雷公曰其走腹則一者何岐伯曰腎之性喜逆行故由下而上蓋以逆為順也雷公曰逆行宜病矣岐伯曰逆而順故不病若順走是違其性矣反生病也雷公曰當盡奏之岐伯曰帝問何以明之公奏曰以言導之切而驗之其髁必動乃可以驗逆順之行也雷公曰謹奉教以聞陳遠公曰十二經脈有走手走足走頭走腹之異各講得鑿鑿其講順逆不同處何人敢措一辭經脈終始篇雷公問於岐伯曰十二經之脈既有終始靈素詳言之而走頭走腹走足走手之義尚未明也願畢其辭岐伯曰手三陽從手走頭足三陽從頭走足乃高之接下也足三陰從足走腹手三陰從腹走手乃卑之趨上也陰陽無間故上下相迎高卑相迓與晝夜循環同流而不定耳夫陰陽者人身之夫婦也氣血者人身之陰陽也夫倡則婦隨氣行則血赴氣主煦之血主濡之乾作天門大腸司其事也巽作地戶膽持其權也泰居艮小腸之昌也否居坤胃之殃也雷公曰善請言順逆之別岐伯曰足三陰自足走腹順也自腹走足逆也足三陽自頭走足順也自足走頭逆也手三陰自藏走手順也自手走藏逆也手三陽自手走頭順也自頭走手逆也夫足之三陰從足走腹惟足少陰腎脈繞而下行與肝脾直行者以衝脈與之並行也是以逆為順也陳遠公曰十二經有頭腹手足之殊有順中之逆有逆中之順說得更為明白經氣本標篇雷公問於岐伯曰十二經氣有標本乎岐伯曰有之雷公曰請言標本之所在岐伯曰足太陽之本在跟以上五寸中標在兩絡命門足少陽之本在竅陰之間標在窗籠之前足少陰之本在內踝下三寸中標在背腧足厥陰之本在行間上五寸所標在背腧足陽明之本在厲兌標在人迎頰挾頏顙足太陰之本在中封前上四寸中標在舌本手太陽之本在外踝之後標在命門之上一寸手少陽之本在小指次指之間上二寸標在耳後上角下外眥手陽明之本在肘骨中上至別陽標在顏下合鉗上手太陰之本在寸口中標在腋內動脈手少陰之本在銳骨之端標在背腧手心主之本在掌後兩筋之間二寸中標在腋下三寸此標本之所在也雷公曰標本皆可刺乎岐伯曰氣之標本皆不可刺也雷公曰其不可刺何也岐伯曰氣各有沖沖不可刺也雷公曰請言氣衝岐伯曰胸氣有沖腹氣有沖頭氣有沖脛氣有沖皆不可刺也雷公曰頭之沖何所乎岐伯曰頭之沖腦也雷公日胸之沖何所乎岐伯曰胸之沖膺與背腧也腧亦不可刺也雷公曰腹之沖何所乎岐伯曰腹之沖背腧與衝脈及左右之動脈也雷公曰脛之沖何所乎岐伯曰脛之沖即臍之氣街及承山踝上以下此皆不可刺也雷公曰不可刺止此乎岐伯曰大氣之摶而不行者積於胸中藏於氣海出於肺循咽喉呼吸而出入也是氣海猶氣街也應天地之大數出三入一皆不可刺也陳遠公曰十二經氣各有標本各不可刺不可刺者以衝脈之不可刺也不知衝脈即不知刺法也臟腑闡微篇雷公問於岐伯曰臟止五乎腑止六乎岐伯曰臟六腑七也雷公曰臟六何以名五也岐伯曰心肝脾肺腎五行之正也故名五臟胞胎非五行之正也雖臟不以臟名之雷公曰胞胎何以非五臟之正也岐伯曰心火也肝木也脾土也肺金也腎水也一臟各屬一行胞胎處水水之歧非正也故不可稱六臟也雷公曰腎中有火亦水火之歧也何腎稱臟乎岐伯曰腎中之火先天火也居兩腎中而腎專司水也胞胎上繫心下連腎往來心腎接續於水火之際可名為火亦可名為水非水火之正也雷公曰然則胞胎何以為臟乎岐伯曰胞胎處水火之兩歧心腎之交非胞胎之系不能通達上下寧獨婦人有之男子未嘗無也吾因其兩歧置於五臟之外非胞胎之不為臟也雷公曰男女各有之亦有異乎岐伯曰系同而口異也男女無此係則水火不交受病同也女系無口則不能受妊是胞胎者生生之機屬陰而藏於陽非臟而何雷公曰胞胎之口又何以異岐伯曰胞胎之系上出於心之膜膈下連兩腎此男女之同也惟女下大而上細上無口而下有口故能納精以受妊雷公曰腑七而名六何也岐伯曰大小腸膀胱膽胃三焦包絡此七腑也遺包絡不稱腑者尊帝耳雷公曰包絡可遺乎岐伯曰不可遺也包絡為脾胃之母土非火不生五臟六腑之氣咸仰於心君心火無為必藉包絡有為往來宣布胃氣能入脾氣能出各臟腑之氣始能變化也雷公曰包絡既為一腑奈何尊帝遺之尊心為君火稱包絡為相火可乎請登之外經咸以為則陳遠公曰臟六而言五者言臟之正也腑七而言六者言腑之偏也舉五而略六非不知胞胎也舉六而略七非不知包絡也有雷公之問而胞胎包絡昭於古今矣考訂經脈篇雷公問於岐伯曰十二經脈天師詳之而所以往來相通之故尚未盡也幸宣明奧義傳諸奕祀可乎岐伯曰可肺屬手太陰太陰者月之象也月屬金肺亦屬金肺之脈走於手故曰手太陰也起於中焦胃脘之上胃屬土土能生金是胃乃肺之母也下絡大腸者以大腸亦屬金為胃之庶子而肺為大腸之兄兄能包弟足以網羅之也絡即網羅包舉之義循於胃口者以胃為肺之母自必遊熙於母家省受胃土之氣也肺脈又上於鬲胃之氣多必分氣以給其子肺得胃母之氣上歸肺宮必由鬲而升肺受胃之氣肺自成家於是由中焦而脈乃行橫出腋下畏心而不敢犯也然而肺之系實通於心以心為肺之君而肺乃臣也臣必朝於君此述職之路也下循臑內行少陰心主之前者又謁相之門也心主即心包絡為心君之相包絡代君以行事心克肺金必借心主之氣以相刑呼吸相通全在此係之相聯也肺稟天王之尊必奉宰輔之令所以行於少陰心主之前而不敢緩也自此而下於肘中乃走於臂由臂而走於寸口魚際皆肺脈相通之道循魚際出大指之端為肺脈之盡經脈盡復行從腕後直出次指內廉乃旁出之脈也雷公曰脾經若何岐伯曰脾乃土臟其性濕以足太陰名之太陰之月夜照於土月乃陰象脾屬土得月之陰氣故以太陰名之其脈起於足之大指端故又曰足太陰也脾脈即起於足下下必升上由足大指內側肉際過橫骨後上內踝前廉上踹內循脛骨後交出厥陰之前乃入肝經之路也夫肝木克脾宜為脾之所畏何故脈反通於肝不知肝雖剋土而木亦能成土土無木氣之通則土少發生之氣所以畏肝而又未嘗不喜肝也交出足厥陰之前圖合於肝木耳上膝股內前廉入腹者歸於脾經之本臟也蓋腹脾之正宮脾屬土居於中州中州為天下之腹脾乃人一身之腹也脾與胃為表裡脾內而胃外脾為胃所包故絡於胃脾得胃氣則脾之氣始能上升故脈亦隨之上鬲趨喉嚨而至舌本以舌本為心之苗而脾為心之子子母之氣自相通而不隔也然而舌為心之外竅非心之內廷也脾之脈雖至於舌而終未至於心故其支又行借胃之氣從胃中中脘之外上鬲而脈通於膻中之分上交於手少陰心經子親母之象也雷公曰心經若何岐伯曰心為火臟以手少陰名之者蓋心火乃後天也後天者有形之火也星應熒惑雖屬火而實屬陰且脈走於手故以手少陰名之他臟腑之脈皆起於手足心脈獨起於心不與眾脈同者以心為君主總攬權綱不寄其任於四末也心之系五臟七腑無不相通尤通者小腸也小腸為心之表而心實絡於小腸下通任脈故任脈即借小腸之氣以上通於心為朝君之象也心之系又上與肺相通挾咽喉而入於目以發其文明之彩也復從心系上肺下出腋下循臑內後廉行手厥陰經心主之後下肘循臂至小指之內出其端此心脈系之直行也又由肺曲折而後並脊直下與腎相貫串當命門之中此心腎既濟之路也夫心為火臟懼畏水克何故系通於腎使腎有路以相犯乎不知心火與命門之火原不可一日不相通也心得命門之火則心火有根心非腎水之滋則心火不旺蓋心火必得腎中水火以相養是以克為生也即有腎火腎水之相生而後心之系各通臟腑無扞格之憂矣由是而左通於肝肝本屬木為生心之母也心火雖生於命門先天之火而非後天肝木培之則先天之火氣亦不旺故心之系通於肝者亦欲得肝木相生之氣也肝氣既通而膽在肝之旁通肝即通於膽又勢之甚便者況膽又為心之父同本之親尤無阻隔也由是而通於脾脾乃心之子也雖脾土不藉心火之生然胃為心之愛子胃土非心火不生心既生胃生胃必生脾此脾胃之系所以相接而無間也由是而通於肺火性炎上而肺葉當之得毋有傷然而頑金非火不柔克中亦有生之象倘肺金無火則金寒水冷胃與膀胱之化源絕矣何以溫腎而傳化於大腸乎由是而通於心主心主即膻中包絡也為心君之相臣奉心君以司化其出入之經較五臟六腑更近真有心喜亦喜心憂亦憂之象呼吸相通代君司化以使令夫三焦俾上中下之氣無不畢達實心之系通之也雷公曰腎經若何岐伯曰腎屬水少陰正水之象海水者少陰水也隨月為盈虛而腎應之名之為足少陰者脈起於足少陰之下也由足心而上循內踝之後別入跟中上膊出膕上股貫脊乃河車之路即任督之路也然俱屬於腎有腎水而河車之路通無腎水而河車之路塞有腎水而督脈之路行無腎水而督脈之路斷是二經之相通相行全責於腎故河車之路督脈之路即腎經之路也由是而行於肝母入於子舍之義也由是而行於脾水行於地中之義也過肝脾二經而絡於膀胱者以腎為膀胱之裡而膀胱為腎之表膀胱得腎氣而始化正同此路之相通氣得以往來之耳其絡於膀胱也貫脊會督而還出於臍之前通任脈始得達於膀胱雖氣化可至實有經可通而通之也其直行者又由肝以入肺子歸母之家也由肺而上循喉嚨挾舌本而終是欲朝君先通於喉舌也夫腎與心雖若相剋而實相生故其系別出而繞於心又未敢遽朝於心君注胸之膻中包絡而後腎經之精上奉化為心之液矣此君王下取於民之義亦草野上貢於國之誼也各臟止有一而腎有二者兩儀之象也兩儀者日月也月主陰日主陽似腎乃水臟宜應月不宜應日然而月之中未嘗無陽之氣日之中未嘗無陰之氣腎配日月正以其中之有陰陽也陰藏於陽之中陽隱於陰之內疊相為用不啻日月之照臨也蓋五臟七腑各有水火獨腎臟之水火處於無形乃先天之水火非若各臟腑之水火俱屬後天也夫同是水火腎獨屬之先天實有主以存乎兩腎之間也主者命門也命門為小心若太極之象能生先天之水火因以生後天之水火也於是裁成夫五臟七腑各安於諸宮享其奠定之福化生於無窮耳雷公曰肝經若何岐伯曰肝屬足厥陰厥陰者逆陰也上應雷火脈起足大指叢毛之際故以足厥陰名之雷火皆從地起騰於天之上其性急不可制抑肝之性亦急乃陰經中之最逆者少拂其意輒厥逆而不可止循跗上上踝交出太陰脾土之後上膕內廉循腹入陰毛中過陰器以抵於小腹雖趨肝之路亦趨脾之路也即趨於脾必趨於胃矣肝之系既通於脾胃凡有所逆必先犯於脾胃矣亦其途路之熟也雖然肝之系通於脾胃而肝之氣必歸於本宮故其系又走於肝葉之中肝葉之旁有膽附焉膽為肝之兄肝為膽之弟膽不絡肝而肝反絡膽者弟強於兄之義也上貫膈者趨心之路也肝性急宜直走於心之宮矣乃不直走於心反走膜鬲布於脅肋之間者母慈之義也慈母憐子必為子多方曲折以厚其藏脅肋正心宮之倉庫也然而其性正急不能久安於脅肋之間循喉嚨之後上入頏顙連於目系上出額間而會督脈於巔項乃木火升上之路也其支者從目系下頰環唇欲隨口舌之竅以泄肝木之鬱火也其支者又從肝別貫膈上注肺中畏肺金之剋木通此經為偵探之途也雷公曰五臟已知其旨矣請詳言七腑岐伯曰胃經亦稱陽明者以其脈接大腸手陽明之脈由鼻額而下走於足也然而胃經屬陽明者又非同大腸之謂胃乃多氣多血之腑實有日月並明之象乃純陽之腑主受而又主化也陽主上升由額而遊行於齒口唇吻循頤頰耳前而會於額顱以顯其陽之無不到也其支別者從頤後下人迎循喉嚨入缺盆行足少陰之外下膈通腎與心胞之氣蓋胃為腎之關又為心包之用得氣於二經胃始能蒸腐水穀以化精微也胃既得二經之氣必歸於胃中故仍屬胃也胃之旁絡於脾胃為脾之夫脾為胃之婦脾聽胃使以行其運化者也其直行者從缺盆下乳內廉挾臍而入氣街氣街者氣衝之穴也乃生氣之源探源而後氣充於乳房始能散布各經絡也其支者起於胃口循腹過足少陰腎經之外本經之裡下至氣街而合仍是取氣於腎以助其生氣之源也由是而胃既得氣之本乃可下行以達於足從氣街而下髀關抵伏兔下膝臏循脛下跗入中指之內庭而終者皆胃下達之路也其支者從膝之下廉三寸別入中指之外間復是旁行之路正見其多氣多血無往不周也其支者別跗上入大指間出足厥陰交於足太陰避肝木之克近脾土之氣也雷公曰請言三焦之經岐伯曰三焦屬之手少陽者以三焦無形得膽木少陽之氣以生其火而脈起於手之小指次指之端故以手少陽名之循手腕出臂貫肘循臑之外行手太陽之裡手陽明之外火氣欲通於大小腸也上肩循臂臑交出足少陽之後正倚附於膽木以取其木中之火也下缺盆由足陽明之外而交會於膻中之上焦散布其氣而絡繞於心包絡之中焦又下膈入絡膀胱以約下焦若胃若心包絡若膀胱皆三焦之氣往來於上中下之際故不分屬於三經而仍專屬於三焦也然而三焦之氣雖往來於上中下之際使無根以為主則氣亦時聚時散不可久矣詎知三焦雖得膽木之氣以生而非命門之火則不長三焦有命門以為根而後布氣於胃則胃始有運用之機布氣於心包絡則心包絡始有運行之權布氣於膀胱則膀胱始有運化之柄也其支者從膻中而上出缺盆之外上項系耳後直上出耳上角至䪼無非隨腎之火氣而上行也其支者又從耳後入耳中出耳前過客主人之穴交頰至目銳眥亦火性上炎隨心包之氣上行然目銳眥實系膽經之穴仍欲依附木氣以生火氣耳雷公曰請言心主之經岐伯曰心主之經即包絡之府也又名膻中屬手厥陰者以其代君出治為心君之相臣臣乃陰象故屬陰然奉君令以出治有不敢少安於頃刻故其性又急與肝木之性正相同亦以厥陰名之因其難順而易逆也夫心之脈出於心之本宮心包絡之脈出於胸中包絡在心之外正在胸之中是脈出於胸中者正其脈屬於包絡之本宮也各臟腑脈出於外心與包絡脈出於中是二經較各臟腑最尊也夫腎系交於心包絡實與腎相接蓋心主之氣與腎宮命門之氣同氣相合故相親而不相離也由是下於膈歷絡三焦以三焦之腑氣與命門心主之氣彼此實未嘗異所以籠絡而相合為一有表裡之名實無表裡也其支者循胸中出脅抵腋循臑內行於太陰肺脾少陰心腎之中取肺腎之氣以生心液也入脈下臂入掌內又循中指以出其端其支者又由掌中循無名指以出其端與少陽三焦之脈相交會正顯其同氣相親表裡如一也夫心主與三焦兩經也必統言其相合者蓋三焦無形借心主之氣相通於上中下之間故離心主無以見三焦之用所以必合而言之也雷公曰請言膽經岐伯曰膽經屬足少陽者以膽之脈得春木初陽之氣而又下趨於足故以足少陽名之然膽之脈雖趨於足而實起目之銳眥接手少陽三焦之經也由目銳眥上抵頭角下耳循頸行手少陽之脈前至肩上交出手少陽之後以入缺盆之外無非助三焦之火氣也其支者從耳後入耳中出走耳前至目銳眥之後雖旁出其支實亦仍顧三焦之脈也其支者別自目外而下大迎合手少陽三焦抵於䪼下下頸後合缺盆以下胸中貫膜膈心包絡以絡於肝蓋心包絡乃膽之子而肝乃膽之弟故相親而相近也第膽雖肝之兄而附於肝實為肝之表而屬於膽肝膽兄弟之分即表裡之別也膽分肝之氣則膽之汁始旺膽之氣始張而後可以分氣於兩脅出氣街繞毛際而橫入髀厭之中也其直者從缺盆下腋循胸過季脅與前之入髀厭者相合乃下循髀外行太陽陽明之間欲竊水土之氣以自養也出膝外廉下跗骨以直抵絕骨之端下出外踝循跗上入小指次指之間乃其直行之路也其支者又別跗上入大指歧骨內出其端還貫入爪甲出三毛以交於足厥陰之脈親肝木之氣以自旺蓋陽得陰而生也雷公曰請言膀胱之經岐伯曰膀胱之經屬足太陽者蓋太陽為巨陽上應於日膀胱得日之火氣下走於足猶太陽火光普照於地也其脈起目內眥交手太陽小腸之經受其火氣也上額交巔至耳上角皆火性之炎上也其直行者從巔入絡腦還出別下項循肩膊內挾脊兩旁下行抵於腰入循膂絡腎益膀胱為腎之表故系連於腎通腎中命門之氣取其氣以歸膀胱之中始能氣化而出小便也雖氣出於腎經而其繫腰不可不屬之膀胱也其支者從腰中下挾脊以貫臀入膕中而止亦借腎氣下達之也其支者從膊內別行下貫脾膂下歷尻臀化小便通陰之器而下出也過髀樞循髀外下合膕中下貫於兩踹內出外踝之後循京骨至小指外側交於足少陰之腎經亦取腎之氣可由下而升以上化其水也雷公曰請言小腸之經岐伯曰小腸之經屬手太陽者以脈起於手之小指又得心火之氣而名之也夫心火屬少陰得心火之氣宜稱陰矣然而心火居於內者為陰發於外者為陽小腸為心之表也故稱陽而不稱陰且其性原屬陽得太陽之日氣故亦以太陽名之其脈上腕出踝循臂出肘循臑行手陽明少陽之外與太陽膽氣相通欲得金氣自寒欲得木氣自生也交肩上入缺盆循肩向腋下行當膻中而絡於心合君相二火之氣也循咽下膈以抵於胃雖火能生胃而小腸主出不主生何以抵胃蓋受胃之氣運化精微而生糟粕猶之生胃也故接胃之氣下行任脈之外以自歸於小腸之正宮非小腸之屬而誰屬乎其支者從缺盆循頸頰上至目銳眥入於耳中此亦火性炎上欲趨竅而出也其支者別循頰上䪼抵鼻至目內眥斜絡於顴以交足太陽膀胱之經蓋陽以趨陽之應也雷公曰請言大腸之經岐伯曰大腸之經名為手陽明者以大腸職司傳化有顯明昭著之意陽之象也夫大腸屬金宜為陰象不屬陰而屬陽者因其主出而不主藏也起於手大指次指之端故亦以手名之循指而入於臂入肘上臑上肩下入缺盆而絡於肺以肺之氣能包舉大腸而大腸之系亦上絡於肺也大腸得肺氣而易於傳化故其氣不能久留於膈中而系亦下膈直趨大腸以安其傳化之職夫大腸之能開能闔腎主之是大腸之氣化宜通於腎何以大腸之系絕不與腎會乎不知肺金之氣即腎中水火之氣也腎之氣必來於肺中而肺中之氣即降於大腸之內則腎之氣安有不入於大腸之中者乎不必更有系通腎而後得其水火之氣始能傳化而開闔之也其支者從缺盆上頸貫頰入下齒縫中還出夾兩口吻交於唇中之左右上挾鼻孔正顯其得肺腎之氣隨肺腎之脈而上升之徵也陳遠公曰十二經脈各說得詳盡不必逐段論之包絡配腑篇天老問於岐伯曰天有六氣化生地之五行地有五行化生人之五臟有五臟之陰即宜有五腑之陽矣何以臟止五腑有七也岐伯曰心包絡腑也性屬陰故與臟氣相同所以分配六腑也天老曰心包絡即分配腑矣是心包絡即臟也何不名臟而必別之為腑耶岐伯曰心包絡非臟也天老曰非臟列於臟中毋乃不可乎岐伯曰臟稱五不稱六是不以臟予包絡也腑稱六不稱七是不以腑名包絡也天老曰心包絡非臟非腑何以與三焦相合乎岐伯曰包絡與三焦為表裡二經皆有名無形五臟有形與形相合包絡無形故與無形相合也天老曰三焦為孤臟即各為臟豈合於包絡乎岐伯曰三焦雖亦稱臟然孤而寡合仍是腑非臟也舍包絡之氣實無可依天然配合非勉強附會也天老曰善雷公曰肺合大腸心合小腸肝合膽脾合胃腎合膀胱此天合也三焦與心包絡相合恐非天合矣岐伯曰包絡非臟而與三焦合者包絡里三焦表也雷公曰三焦腑也何分表裡乎岐伯曰三焦之氣本與腎親親腎不合腎者以腎有水氣也故不合腎而合於包絡耳雷公曰包絡之火氣出於腎三焦取火於腎不勝取火於包絡乎岐伯曰膀胱與腎為表裡則腎之火氣必親膀胱而疏三焦矣包絡得腎之火氣自成其腑代心宣化雖腑猶臟也包絡無他腑之附得三焦之依而更親是以三焦樂為表包絡亦自安於里孤者不孤自合者永合也雷公曰善應龍問曰包絡腑也三焦亦自成腑何以為包絡之使乎岐伯曰包絡即膻中也為心膜鬲近於心宮遮護君主其位最親其權最重故三焦奉令不敢後也應龍曰包絡代心宣化宜各臟腑皆奉合矣何獨使三焦乎岐伯曰各腑皆有表裡故不聽包絡之使惟三焦無臟為表裡故包絡可以使之應龍曰三焦何樂為包絡使乎岐伯曰包絡代心出治腑與臟同三焦聽使於包絡猶聽使於心故包絡為里三焦為表豈勉強附會哉應龍曰善陳士鐸曰包絡之合三焦非無因之合也包絡之使三焦因其合而使之也然合者仍合於心耳非包絡之司為合也
