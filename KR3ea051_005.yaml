body:
  text: 五卷命門經主篇雷公問於岐伯曰十二經各有一主主在何經岐伯曰腎中之命門為十二經之主也雷公曰十二經最神者心也宜心為主不宜以腎中之命門為主也岐伯曰以心為主此主之所以不明也主在腎之中不在心之內然而離心非主離腎亦非主也命門殆通心腎以為主乎豈惟通心腎哉五臟七腑無不共相貫通也雷公曰其共相貫通者何也岐伯曰人非火不生命門屬火先天之火也十二經得命門之火始能生化雖十二經來通於命門亦命門之火原能通之也雷公曰命門屬火宜與火相親何偏居於腎以親水氣耶岐伯曰腎火無形之火也腎水無形之水也有形之火水能克之無形之火水能生之火克於水者有形之水也火生於水者無形之水也然而無形之火偏能生無形之水故火不藏於火轉藏於水所謂一陽陷於二陰之間也人身先生命門而後生心心生肺肺生脾脾生肝肝生腎相合而相生亦相剋而相生也十二經非命門不生正不可以生克而拘視之也故心得命門而神明應物也肝得命門而謀慮也膽得命門而決斷也胃得命門而受納也脾得命門而轉輸也肺得命門而治節也大腸得命門而傳導也小腸得命門而布化也腎得命門而作強也三焦得命門而決瀆也膀胱得命門而畜泄也是十二經為主之官而命門為十二官之主有此主則十二官治無此主則十二官亡矣命門為主供十二官之取資其火易衰其火亦易旺然衰乃真衰旺乃假旺先天之火非先天之水不生水中補火則真衰者不衰矣火中補水則假旺者不旺矣見其衰補火而不濟之以水則火益微見其旺瀉火而不濟之以水則火益熾雷公曰何道之渺乎非天師又孰能知之陳士鐸曰命門在心腎之中又何說之有無如世人未知也此篇講得暢快非無主之文五行生剋篇雷公問於岐伯曰余讀內經載五行甚詳其旨盡之乎岐伯曰五行之理又何易窮哉雷公曰盍不盡言之岐伯曰談天乎談地乎談人乎雷公曰請言人之五行岐伯曰心肝脾肺腎配火木土金水非人身之五行乎雷公曰請言其變岐伯曰變則又何能盡哉試言其生克生克之變者生中克也克中生也生不全生也克不全克也生畏克而不敢生也克畏生而不敢克也雷公曰何以見生中之克乎岐伯曰腎生肝腎中無水水涸而火騰矣肝木受焚腎何生乎肝生心肝中無水水燥而木焦矣心火無煙肝何生乎心君火也包絡相火也二火無水時自炎也土不得火之生反得火之害矣脾生肺金也土中無水乾土何以生物爍石流金不生金反剋金矣肺生腎水也金中無水死金何以出泉崩爐飛汞不生水反剋水矣蓋五行多水則不生五行無水亦不生也雷公曰何以見克中之生乎岐伯曰肝剋土土得木以疏通則土有生氣矣脾剋水水得土而畜積則土有生基矣腎剋火火得水以相濟則火有神光矣心剋金然肺金必得心火以煅煉也肺剋木然肝木必得肺金以斫削也非皆克以生之乎雷公曰請言生不全生岐伯曰生不全生者專言腎水也各臟腑無不取資於腎心得腎水而神明煥發也脾得腎水而精微化導也肺得腎水而清肅下行也肝得腎水而謀慮決斷也七腑亦無不得腎水而布化也然而取資多者分給必少矣親於此者疏於彼厚於上者薄於下此生之所以難全也雷公曰請言克不全克岐伯曰克不全克者專言腎火也腎火易動難靜易逆難順易上難下故一動則無不動矣一逆則無不逆矣一上則無不上矣騰於心燥煩矣入於脾乾涸矣升於肺喘嗽矣流於肝焚燒矣衝擊於七腑燥渴矣雖然腎火乃雷火也亦龍火也龍雷之火其性雖猛然聚則力專分則勢散無乎不克反無乎全克矣雷公曰生畏克而不敢生者若何岐伯曰肝木生心火也而肺金太旺肝畏肺克不敢生心則心氣轉弱金克肝木矣心火生胃土也而腎火太旺不敢生胃則胃氣更虛水侵胃土矣心包之火生脾土也而腎水過泛不敢生脾則脾氣加困水欺脾土矣脾胃之土生肺金也而肝木過剛脾胃畏肝不敢生肺則肺氣愈損木侮脾胃矣肺金生腎水也而心火過炎肺畏心克不敢生腎則腎氣益枯火刑肺金矣腎水生肝木也而脾胃過燥腎畏脾胃之土不敢生肝則肝氣更凋土製腎水矣雷公曰何法以制之乎岐伯曰制克以遂其生則生不畏克助生而忘其克則克即為生雷公曰善克畏生而不敢克者又若何岐伯曰肝木之盛由於腎水之旺也木旺而肺氣自衰柔金安能克剛木乎脾胃土盛由於心火之旺也土旺而肝氣自弱僵木能克焦土乎腎水之盛由肺金之旺也水旺而脾土自微淺土能克湍水乎心火之盛由於肝木之旺也火旺而腎氣必虛弱水能克烈火乎肺金之盛由於脾土之旺也金盛而心氣自怯寒火能克頑金乎雷公曰何法以制之岐伯曰救其生不必制其克則弱多為強因其克反更培其生則衰轉為盛雷公曰善陳士鐸曰五行生剋本不可顛倒不可顛倒而顛倒者言生克之變也篇中專言其變而變不可窮矣當細細觀之小心真主篇為當問於岐伯曰物之生也生於陽物之成也成於陰陽火也陰水也二者在身藏於何物乎岐伯曰大哉問也陰陽有先後天之殊也後天之陰陽藏於各臟腑先天之陰陽藏於命門為當曰命門何物也岐伯曰命門者水火之源水者陰中之水也火者陰中之火也為當曰水火均屬陰是命門藏陰不藏陽也其藏陽又何所乎岐伯曰命門藏陰即藏陽也為當曰其藏陰即藏陽之義何居岐伯曰陰中之水者真水也陰中之火者真火也真火者真水之所生真水者真火之所生也水生於火者火中有陽也火生於水者水中有陽也故命門之火謂之原氣命門之水謂之原精精旺則體強氣旺則形壯命門水火實藏陰陽所以為十二經之主也主者即十二官之化源也命門之精氣盡則水火兩亡陰陽間隔真息不調人病輒死矣為當曰陰陽有偏勝何也岐伯曰陰勝者非陰盛也命門火微也陽勝者非陽盛也命門水竭也為當曰陰勝在下陽勝在上者何也岐伯曰陰勝於下者水竭其源則陰不歸陽矣陽勝於上者火衰其本則陽不歸陰矣陽不歸陰則火炎於上而不降陰不歸陽則水沉於下而不升可見命門為水火之府也陰陽之宅也精氣之根也死生之竇也為當曰命門為十二官之主寄於何臟岐伯曰七節之旁中有小心小心即命門也為當曰鬲肓之上中有父母非小心之謂歟岐伯曰鬲肓之上中有父母者言三焦包絡也非言小心也小心在心之下腎之中陳士鐸曰小心在心腎之中乃陰陽之中也陰無陽氣則火不生陽無陰氣則水不長世人錯認小心在鬲肓之上此命門真主不明也誰知小心即命門哉水不剋火篇大封司馬問於岐伯曰水剋火者也人有飲水而火不解者豈水不能制火乎岐伯曰人生於火養於水水養火者先天之真水也水剋火者後天之邪水也飲水而火熱不解者外水不能救內火也大封司馬曰余終不解其義幸明示之岐伯曰天開於子地闢於醜人生於寅寅實有火也天地以陽氣為生以陰氣為殺陽即火陰即水也然而火不同有形之火離火也無形之火乾火也有形之火水之所克無形之火水之所生飲水而火不解者無形之火得有形之水而不相入也豈惟不能解且有激之而火熾者大封司馬曰然則水不可飲乎岐伯曰水可少飲以解燥不可暢飲以解氛大封司馬曰此何故乎岐伯曰無形之火旺則有形之火微無形之火衰則有形之火盛火得水反熾必多飲水也水多則無形之火因之益微矣無形之火微而有形之火愈增酷烈之勢此外水之所以不能救內火非水之不剋火也大封司馬曰何以治之岐伯曰補先天無形之水則無形之火自息矣不可見其火熱飲水不解勸多飲以速亡也陳士鐸曰水分有形無形何疑於水哉水克有形之火難克無形之火故水不可飲也說得端然實理非泛然而論也三關升降篇巫咸問曰人身三關在何經乎岐伯曰三關者河車之關也上玉枕中腎脊下尾閭巫咸曰三關何故關人生死乎岐伯曰關人生死故名曰關巫咸曰請問生死之義岐伯曰命門者水中火也水火之中實藏先天之氣脾胃之氣後天之氣也先天之氣不交於後天則先天之氣不長後天之氣不交於先天則後天之氣不化二氣必晝夜交而後生生不息也然而後天之氣必得先天之氣先交而後生而先天之氣必由下而上升降諸脾胃以分散於各臟腑三關者先天之氣所行之徑道也氣旺則升降無礙氣衰則阻阻則人病矣巫咸曰氣衰安旺乎岐伯曰助命門之火益腎陰之水則氣自旺矣巫咸曰善陳士鐸曰人有三關故可生可死然生死實在先天不在後天也篇中講後天者返死而生非愛生而惡死人能長守先天何惡先天之能死乎表微篇奚仲問於岐伯曰天師陰陽別論中有陰結陽結之言結在臟乎抑結在腑乎岐伯曰合臟腑言之也奚仲曰臟陰腑陽陰結在臟陽結在腑乎岐伯曰陰結陽結者言陰陽之氣結也合臟腑言之非陽結而陰不結陰結而陽不結也陰陽之道彼此相根獨陽不結獨陰亦不結也奚仲曰陰陽別論中又有剛與剛之言言臟乎言腑乎岐伯曰專言臟腑也陽陰氣不和臟腑有過剛之失兩剛相遇陽過旺陰不相接也奚仲曰臟之剛乎抑腑之剛乎岐伯曰臟剛傳腑則剛在臟也腑剛傳臟則剛在腑也奚仲曰陰陽別論中又有陰搏陽搏之言亦言臟腑乎岐伯曰陰搏陽搏者言十二經之脈非言臟腑也雖然十二臟腑之陰陽不和而後十二經脈始現陰陽之搏否則搏之象不現於脈也然則陰搏陽搏言脈而即言臟腑也奚仲曰善陳士鐸曰陽結陰結陰搏陽搏俱講得微妙呼吸篇雷公問於岐伯曰人氣之呼吸應天地之呼吸乎岐伯曰天地人同之雷公曰心肺主呼腎肝主吸是呼出乃心肺也吸入乃腎肝也何有時呼出不屬心肺而屬腎肝吸入不屬腎肝而屬心肺乎岐伯曰一呼不再呼一吸不再吸故呼中有吸吸中有呼也雷公曰請悉言之岐伯曰呼出者陽氣之出也吸入者陰氣之入也故呼應天而吸應地呼不再呼呼中有吸也吸不再吸吸中有呼也故呼應天而亦應地吸應地而亦應天所以呼出心也肺也從天言之也吸入腎也肝也從地言之也呼出腎也肝也從地言之也吸入心也肺也從天言之也蓋獨陽不生呼中有吸者陽中有陰也獨陰不長吸中有呼者陰中有陽也天之氣不降則地之氣不升地之氣不升則天之氣不降天之氣下降者即天之氣呼出也地之氣上升者即地之氣吸入也故呼出心肺陽氣也而腎肝陰氣輒隨陽而俱出矣吸入腎肝陰氣也而心肺陽氣輒隨陰而俱入矣所以陰陽之氣雖有呼吸而陰陽之根無間隔也呼吸之間雖有出入而陰陽之本無兩岐也雷公曰善陳士鐸曰呼中有吸吸中有呼是一是二人可參天地也脈動篇雷公問於岐伯曰手太陰肺足陽明胃足少陰腎三經之脈常動不休者何也岐伯曰脈之常動不休者不止肺胃腎也雷公曰何以見之岐伯曰四末陰陽之會者氣之大絡也四街者氣之曲徑也周流一身晝夜環轉氣無一息之止脈無一晷之停也肺胃腎脈獨動者勝於各臟腑耳非三經之氣獨動不休也夫氣之在脈也邪氣中之也有清氣中之有濁氣中之邪氣中之也清氣中在上濁氣中在下此皆客氣也見於脈中決於氣口氣口虛補而實之氣口盛瀉而泄之雷公曰十二經動脈之穴可悉舉之乎岐伯曰手厥陰心包經動脈在手之勞宮也手太陰肺經動脈在手之大淵也手少陰心經動脈在手之陰郤也足太陰脾經動脈在腹衝門也足厥陰肝經動脈在足之太衝也足少陰腎經動脈在足之太溪也手少陽三焦經動脈在面之和髎也手太陽小腸經動脈在項之天窗也手陽明大腸經動脈在手之陽溪也足太陽膀胱經動脈在足之委中也足少陽膽經動脈在足之懸鐘也足陽明胃經動脈在足之衝陽也各經時動時止不若胃為六腑之原肺為五臟之主腎為十二經之海各常動不休也陳士鐸曰講脈之動處俱有條理非無因之文也瞳子散大篇雲師問於岐伯曰目病瞳子散大者何也岐伯曰必得之內熱多飲也雲師曰世人好飲亦常耳未見瞳子皆散大也岐伯曰內熱者氣血之虛也氣血虛則精耗矣五臟六腑之精皆上注於目瞳子尤精之所注也精注瞳子而目明精不注瞳子而目暗今瞳子散大則視物必無准矣雲師曰然往往視小為大也岐伯曰瞳子之系通於腦腦熱則瞳子亦熱熱極而瞳子散大矣夫瞳子之精神水也得腦氣之熱則水中無非火氣火欲爆而光不收安得不散大乎雲師曰何火之虐乎岐伯曰必飲火酒兼食辛熱之味也火酒大熱得辛熱之味以助之則益熱矣且辛之氣散而火酒者氣酒也亦主散況火酒至陽之味陽之味必升於頭面火熱之毒直歸於腦中矣腦中之精最惡散而最易散也得火酒辛熱之氣有隨入隨散者腦氣既散於中而瞳子散大應於外矣彼氣血未虛者腦氣尚不至盡散也故瞳子亦無散大之象然目則未有不昏者也雲師曰善陳士鐸曰瞳子散大不止於酒大約腎水不足亦能散大然水之不足乃火之有餘也益其陰而火降火降而散大者不散大也不可悟火之虐乎必認作火酒之一者尚非至理
