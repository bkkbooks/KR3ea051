body:
  text: 六卷診原篇雷公問於岐伯曰五臟六腑各有原穴診之可以知病何也岐伯曰診脈不若診原也雷公曰何謂也岐伯曰原者脈氣之所注也切脈之法繁而難知切腧之法約而易識雷公曰請言切腧之法岐伯曰切腧之法不外陰陽氣來清者陽也氣來濁者陰也氣來浮者陽也氣來沉者陰也浮而無者陽將絶也沉而無者陰將絶也浮而清者陽氣之生也沉而清者陰氣之生也浮而濁者陰血之長也浮而清者陽血之長也以此診腧則生死淺深如見矣陳士鐸曰診原法不傳久矣天師之論真得其要也精氣引血篇力牧問於岐伯曰九竅出血何也岐伯曰血不歸經耳力牧曰病可療乎岐伯曰療非難也引其血之歸經則瘥矣力牧曰九竅出血臟腑之血皆出矣難療而曰易療者何也岐伯曰血失一經者重血失衆經者輕失一經者傷臟腑也失衆經者傷經絡也力牧曰血已出矣何引而歸之岐伯曰補氣以引之補精以引之也力牧曰氣虛則血難攝補氣攝血則余已知之矣補精引血余實未知也岐伯曰血之妄行由腎火之亂動也腎火亂動由腎水之大衰也血得腎火而有所歸亦必得腎水以濟之也夫腎水腎火如夫婦之不可離也腎水旺而腎火自歸腎火安而各經之血自息猶婦在家而招其夫夫既歸宅外侮輒散此補精之能引血也力牧曰兼治之乎抑單治之乎岐伯曰先補氣後補精氣虛不能攝血血攝而精可生也精虛不能藏血血藏而氣益旺也故補氣必須補精耳力牧曰善雖然血之妄出疑火之祟耳不清火而補氣毋乃助火乎岐伯曰血至九竅之出是火盡外泄矣熱變為寒烏可再泄火乎清火則血愈多矣力牧曰善陳士鐸曰失血補氣本是妙理誰知補精即補氣乎補氣寓於補精之中補精寓於補血之內豈是泛然作論者寒變熱熱變寒參得箇中趣才是大羅仙天人一氣篇大撓問於岐伯曰天有轉移人氣隨天而轉移其故何也岐伯曰天之轉移陰陽之氣也人之氣亦陰陽之氣也安得不隨天氣為轉移乎大撓曰天之氣分春夏秋冬人之氣惡能分四序哉天之氣配日月支幹人之氣惡能配兩曜一旬十二時哉岐伯曰公泥於甲子以論天也天不可測而可測人亦不可測而可測也天之氣有春夏秋冬人之氣有喜怒哀樂未嘗無四序也天之氣有日月人之氣有水火未嘗無兩曜也天之氣有甲乙丙丁戊己庚辛壬癸人之氣有陽蹻陰蹻帶衝任督陽維陰維命門胞絡未嘗無一旬也天之氣有子醜寅卯辰巳午未申酉戍亥人之氣有心肝脾肺腎心包膽胃膀胱三焦大小腸未嘗無十二時也天有氣人即有氣以應之天人何殊乎大撓曰天之氣萬古如斯人之氣何故多變動乎岐伯曰人氣之變動因乎人亦因乎天也春宜溫而寒則春行冬令矣春宜溫而熱則春行夏令矣春宜溫而涼則春行秋令矣夏宜熱而溫則夏行春令也夏宜熱而涼則夏行秋令也夏宜熱而寒則夏行冬令也秋宜涼而熱非秋行夏令乎秋宜涼而溫非秋行春令乎秋宜涼而寒非秋行冬令乎冬宜寒而溫是冬行春令矣冬宜寒而熱是冬行夏令矣冬宜寒而涼是冬行秋令矣倒行逆施在天既變動若此欲人臟腑中不隨天變動必不得之數矣大撓曰天氣變動人氣隨天而轉移宜盡人皆如是矣何以有變有不變也岐伯曰人氣隨天而變者常也人氣不隨天而變者非常也大撓曰人氣不隨天氣而變此正人守其常也天師謂非常者豫不得其旨請言其變岐伯曰宜變而不變常也而余謂非常者似其異於常人也斯人也必平日固守元陽未喪其真陰者也陰陽不凋隨天氣之變動彼自行其陰陽之正令故能不變耳大撓曰彼變動者何以治之岐伯曰有餘者瀉之不足者補之鬱則達之熱則寒之寒則溫之如此而已陳士鐸曰天人合一安能變乎說得合一之旨地氣合人篇大撓問曰天人同氣不識地氣亦同於人乎岐伯曰地氣之合於人氣素問靈樞已詳哉言之何公又問也大撓曰內經言地氣統天氣而並論也未嘗分言地氣岐伯曰三才並立天氣即合於地氣地氣即合於人氣原不必分言之也大撓曰地氣有獨合於人氣之時請言其所以合也岐伯曰言其合則合言其分則分大撓曰請言人之獨合於地氣岐伯曰地有九州人有九竅此人之獨合於地也大撓曰內經言之矣岐伯曰雖言之未嘗分析之也大撓曰請言其分岐伯曰左目合冀右目合雍鼻合豫左耳合揚右耳合兗口合徐臍合荊前陰合營後陰合幽也大撓曰其病何以應之岐伯曰冀之地氣逆而人之左目病焉雍之地氣逆而人之右目病焉豫之地氣逆而人之鼻病焉揚之地氣逆而人之左耳病焉兗之地氣逆而人之右耳病焉徐之地氣逆而人之口病焉荊之地氣逆而人之臍病焉營之地氣逆而人之前陰病焉幽之地氣逆而人之後陰病焉此地氣之合病氣也大撓曰有驗有不驗何也岐伯曰驗者人氣之漓也不驗者人氣之固也固者多漓者少故驗者亦少似地氣之不盡合人氣也然而合者理也大撓曰既有不驗恐非定理岐伯曰醫統天地人以言道烏可缺而不全乎寧言地氣聽其驗不驗也大撓曰善陳士鐸曰地氣實合於天何分於人乎地氣有驗不驗者非分於地氣已說其合胡必求其合哉三才並論篇鬼臾區問曰五運之會以司六氣六氣之變以害五臟是五運之陰陽即萬物之綱紀變化之父母生殺之本始也夫子何以教區乎岐伯曰子言是也臾區退而作天元紀各論以廣五運六氣之義岐伯曰臾區之言大而肆乎雖然執臾區之論概治五臟之病是得一而失一也臾區曰何謂乎岐伯曰五運者五行也談五運即闡五行也然五行止有五五運變成六明者視六猶五也昧者眩六為千矣臾區曰弟子之言非歟岐伯曰子言是也臾區曰弟子言是夫子有後言請亟焚之岐伯曰醫道之大也得子言夫乃顯然而醫道又微也執子言微乃隱余所以有後言也雖然余之後言正顯子言之大也臾區曰請悉言之岐伯曰五運乘陰陽而變遷五臟因陰陽而變動執五運以治病未必有合也舍五運以治病未必相離也遺五運以立言則醫理缺其半統五運以立言則醫道該其全豫故稱子言之大而肆也鬼臾區曰請言缺半之理岐伯曰陰陽之氣有盈有虛男女之形有強有弱盈者虛之兆虛者盈之機蓋兩相伏也強者弱之媒弱者強之福蓋兩相倚也合天地人以治邪不可止執五運以治邪也合天地人以扶正不可止執五運以扶正也鬼臾區曰醫道合天地人者始無敝乎岐伯曰人之陰陽與天地相合也陽極生陰陰極生陽未嘗異也世疑陰多於陽陰有群陰陽無二陽也誰知陽有二陽乎有陽之陽有陰之陽君火為陽之陽相火為陰之陽人有君火相火而天地亦有之始成其為天成其為地也使天地無君火萬物何以昭蘇天地無相火萬物何以震動天地之君火日之氣也天地之相火雷之氣也雷出於地而轟於天日臨於天而照於地蓋上下相合人亦何獨不然合天地人以治病則得其全執五運以治病則缺其半矣鬼臾區稽首而嘆曰大哉聖人之言乎區無以測師矣陳士鐸曰六氣即五行之論知五行即知六氣矣世不知五運即不知五行也不知五行即不知六氣矣五運六氣離合篇鬼臾區問曰五運與六氣並講人以為異奈何岐伯曰五運非六氣則陰陽難化六氣非五運則疾病不成二者合而不離也夫寒暑濕燥風火此六氣也金木水火土此五運也六氣分為六五運分為五何不可者詎知六氣可分而五運不可分也蓋病成於六氣可指為寒暑濕燥風火病成於五運不可指為金木水火土以金病必兼水水病必兼木木病必兼火火病必兼土土病必兼金也且有金病而木亦病木病而土亦病土病而水亦病水病而火亦病火病而金亦病也故六氣可分門以論症五運終難拘歲以分門誠以六氣隨五運以為轉移五臟因六氣為變亂此分之不可分也鬼臾區曰然則何以治六氣乎岐伯曰五運之盛衰隨五臟之盛衰為強弱五臟盛而六氣不能衰五臟強而六氣不能弱逢司天在泉之年寒暑濕燥風火有病有不病者正五臟強而不弱也所以五臟盛者何畏運氣之侵哉鬼臾曰善陳士鐸曰六氣之病因五臟之不調也五臟之不調即五行之不正也調五行即調六氣矣六氣分門篇雷公問於岐伯曰五運六氣合而不離統言之可也何鬼臾區分言之多乎岐伯曰五運不可分六氣不可合雷公曰其不可合者何也岐伯曰六氣之中有暑火之異也雷公曰暑火皆火也何分乎岐伯曰火不一也暑外火火內火也雷公曰等火耳火與火相合而相應也奈何異視之岐伯曰內火之動必得外火之引外火之侵必得內火之召也似可合以立論而終不可合以分門者內火與外火異也蓋外火君火也內火相火也君火即暑相火即火暑乃陽火火乃陰火火性不同烏可不區而別乎六氣為陰陽分三陰三陽也三陰三陽中分陽火陰火者分君相之二火也五行概言火而不分君相六氣分言火而各配支幹二火分配而暑與火各司其權各成其病矣故必宜分言之也臾區之說非私言也實聞豫論而推廣之雷公曰豫昧矣請示世之不知二火者陳士鐸曰五行止有一火六氣乃有二火有二火乃分配支幹矣支幹雖分而君相二火實因六氣而異言之於不可異而異者異之於陰陽之二火也六氣獨勝篇雍父問曰天地之氣陰陽盡之乎岐伯曰陰陽足以包天地之氣也雖然陰陽之中變化錯雜未可以一言盡也雍父曰請言其變岐伯曰六氣盡之矣雍父曰六氣是公之已言也請言所未言岐伯曰六氣之中有餘不足勝復去留臾區言之矣尚有一端未言也遇司天在泉之年不隨天地之氣轉移實有其故不可不論也雍父曰請悉論之岐伯曰辰戌之歲太陽司天而天柱不能窒抑之此肝氣之勝也巳亥之歲厥陰司天而天蓬不能窒抑之此心氣之勝也丑未之歲太陰司天而天蓬不能窒抑之此包絡之氣勝也子午之歲少陰司天而天衝不能窒抑之此脾氣之勝也寅申之歲少陽司天而天英不能窒抑之此肺氣之勝也卯酉之歲陽明司天而天芮不能窒抑之此腎氣之勝也雍父曰司天之勝豫知之矣請言在泉之勝岐伯曰丑未之歲太陽在泉而地晶不能窒抑之此肝膽之氣勝也寅申之歲厥陰在泉而地玄不能窒抑之此心與小腸之氣勝也辰戌之歲太陰在泉而地玄不能窒抑之此包絡三焦之氣勝也卯酉之歲少陰在泉而地蒼不能窒抑之此脾胃之氣勝也巳亥之歲少陽在泉而地彤不能窒抑之此肺與大腸之氣勝也子午之歲陽明在泉而地阜不能窒抑之此腎與膀胱之氣勝也雍父曰豫聞順天地之氣者昌逆天地之氣者亡今不為天地所窒抑是逆天地矣不夭而獨存何也岐伯曰順之昌者順天地之正氣也逆之亡者逆天地之邪氣也順可逆而逆可順乎雍父曰同是人也何以能獨勝乎岐伯曰人之強弱不同縱欲與節欲異也雍父曰善陳士鐸曰天蓬地玄獨有二者正分其陰陽也陰陽同而神亦同者正顯其順逆也可見宜順不宜逆矣三合篇雷公問曰寒暑燥濕風火此六氣也天地之運化何合於人而生病岐伯曰五行之生化也雷公曰人之五臟分金木水火土彼此有勝負而人病此臟腑之自病也何關於六氣乎岐伯曰臟腑之五行即天之五行地之五行也天地人三合而生化出矣雷公曰請問三合之生化岐伯曰東方生風風生木木生酸酸生肝肝生筋筋生心在天為風在地為木在體為筋在氣為柔在臟為肝其性為瞬其德為和其用為動其色為蒼其化為榮其蟲毛其政為散其令宣發其變摧拉其眚隕落其味為酸其志為怒怒傷肝悲勝怒風傷肝燥勝風酸傷筋辛勝酸此天地之合人肝也南方生熱熱生火火生苦苦生心心生血血生脾在天為熱在地為火在體為脈在氣為炎在臟為心其性為暑其德為顯其用為躁其色為赤其化為茂其蟲羽其政為明其令鬱蒸其變炎爍其眚燔焫其味為苦其志為喜喜傷心恐勝喜熱傷氣寒勝熱苦傷氣咸勝苦此天地之合人心也中央生濕濕生土土生甘甘生脾脾生肉肉生肺在天為濕在地為土在體為肉在氣為充在臟為脾其性靜堅其德為濡其用為化其色為黃其化為盈其蟲倮其政為謐其令雲雨其變動注其眚淫潰其味為甘其志為思思傷脾怒勝思濕傷肉風勝濕甘傷脾酸勝甘此天地之合人脾也西方生燥燥生金金生辛辛生肺肺生皮毛在天為燥在地為金在體為皮毛在氣為成在臟為肺其性為涼其德為清其用為固其色為白其化為斂其蟲介其政為徑其令霧露其變肅殺其眚蒼落其味為辛其志為憂憂傷肺喜勝憂熱傷皮毛寒勝熱辛傷皮毛苦勝辛此天地之合人肺也北方生寒寒生水水生咸咸生腎腎生骨髓髓生肝在天為寒在地為水在體為骨在氣為堅在臟為腎其性為凜其德為寒其用為藏其色為黑其化為肅其蟲鱗其政為靜其令為寒其變凝冽其眚冰雹其味為咸其志為恐恐傷腎思勝恐寒傷血燥勝寒咸傷血甘勝咸此天地之合人腎也五臟合金木水火土斯化生之所以出也天地不外五行安得不合哉雷公曰五行止五不應與六氣合也岐伯曰六氣即五行也雷公曰五行五而六氣六何以相合乎岐伯曰使五行止五則五行不奇矣五行得六氣則五行之變化無窮余所以授六氣之論而臾區乃肆言之也雷公曰六氣之中各配五行獨火有二此又何故岐伯曰火有君相之分耳人身火多於水五臟之中無臟非火也是以天地之火亦多於金木水土也正顯天地之合於人耳雷公曰大哉言乎釋蒙解惑非天師之謂歟請載登六氣之篇陳士鐸曰五行不外五臟五臟即六氣之論也因五行止有五惟火為二故六氣合二火而論之其實合五臟而言之也
