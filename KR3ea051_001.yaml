body:
  text: 一卷陰陽顛倒篇黃帝聞廣成子窈窈冥冥之旨嘆廣成子之謂天矣退而夜思尚有未獲遣鬼臾區問於岐伯天師曰帝問至道於廣成子廣成子曰至道之精窈窈冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞汝形無搖汝精無思慮營營乃可以長生目無所見耳無所聞心無所知汝神將守汝形形乃長生慎汝內閉汝外多知為敗我為汝遂於大明之上矣至彼至陽之原也為汝入於窈冥之門矣至彼至陰之原也天地有官陰陽有藏慎守汝身物將自壯我守其一以處其和故身可以不老也天師必知厥義幸明晰之岐伯稽首奏曰大哉言乎非吾聖帝安克聞至道哉帝明知故問豈欲傳旨於萬祀乎何心之仁也臣愚何足知之然仁聖明問敢備述以聞窈冥者陰陽之謂也昏默者內外之詞也視聽者耳目之語也至道無形而有形有形而實無形無形藏於有形之中有形化於無形之內始能形與神全精與神合乎鬼臾區曰諾雖然師言微矣未及其妙也岐伯曰乾坤之道不外男女男女之道不外陰陽陰陽之道不外順逆順則生逆則死也陰陽之原即顛倒之術也世人皆順生不知順之有死皆逆死不知逆之有生故未老先衰矣廣成子之教示帝行顛倒之術也鬼臾區贊曰何言之神乎雖然請示其原岐伯曰顛倒之術即探陰陽之原子窈冥之中有神也昏默之中有神也視聽之中有神也探其原而守神精不搖矣探其原而保精神不馳矣精固神全形安能敝乎鬼臾區復奏帝前帝曰俞哉載之外經傳示臣工使共聞至道同遊於無極之野也陳士鐸曰此篇帝問而天師答之乃首篇之論也問不止黃帝而答止天師者帝引天師之論也帝非不知陰陽顛倒之術明知故亦欲盡人皆知廣成子之教也順逆探原篇伯高太師問於岐伯曰天師言顛倒之術即探陰陽之原也其旨奈何岐伯不答再問曰唯唯三問岐伯嘆曰吾不敢隱矣夫陰陽之原者即生克之道也顛倒之術者即順逆之理也知顛倒之術即可知陰陽之原矣伯高曰陰陽不同也天之陰陽地之陰陽人身之陰陽男女之陰陽何以探之哉岐伯曰知其原亦何異哉伯高曰請顯言其原岐伯曰五行順生不生逆死不死生而不生者金生水而剋水水生木而剋木水生火而剋火火生土而剋土土生金而剋金此害生於恩也死而不死者金剋木而生木木剋土而生土土剋水而生水水剋火而生火火剋金而生金此仁生於義也夫五行之順相生而相剋五行之逆不克而不生逆之至者順之至也伯高曰美哉言乎然何以逆而順之也岐伯曰五行之順得土而化五行之逆得土而神土以合之土以成之也伯高曰余知之矣陰中有陽殺之內以求生乎陽中有陰生之內以出死乎余與帝同遊於無極之野也岐伯曰逆而順之必先順而逆之絶欲而毋為邪所侵也守神而毋為境所移也練氣而毋為物所誘也保精而毋為妖所耗也服藥餌以生其津慎吐納以添其液慎勞逸以安其髓節飲食以益其氣其庶幾乎伯高曰天師教我以原者全矣岐伯曰未也心死則身生死心之道即逆之之功也心過死則身亦不生生心之道又順之之功也順而不順始成逆而不逆乎伯高曰志之矣敢忘祕誨哉陳士鐸曰伯高之問亦有為之問也順中求逆逆處求順亦死克之門也今奈何求生於順乎於順處求生不若於逆處求生之為得也回天生育篇雷公問曰人生子嗣天命也豈盡非人事乎岐伯曰天命居半人事居半也雷公曰天可回乎岐伯曰天不可回人事則可盡也雷公曰請言人事岐伯曰男子不能生子者病有九女子不能生子者病有十也雷公曰請晰言之岐伯曰男子九病者精寒也精薄也氣餒也痰盛也精澀也相火過旺也精不能射也氣鬱也天厭也女子十病者胞胎寒也脾胃冷也帶脈急也肝氣鬱也痰氣盛也相火旺也腎水衰也任督病也膀胱氣化不行也氣血虛而不能攝也雷公曰然則治之奈何岐伯曰精寒者溫其火乎精薄者益其髓乎氣餒者壯其氣乎痰盛者消其涎乎精澀者順其水乎火旺者補其精乎精不能射者助其氣乎氣鬱者舒其氣乎天厭者增其勢乎則男子無子而可以有子矣不可徒益真相火也胞胎冷者溫其胞胎乎脾胃冷者暖其脾胃乎帶脈急者緩其帶脈乎肝氣鬱者開其肝氣乎痰氣盛者消其痰氣乎相火旺者平其相火乎腎水衰者滋其腎水乎任督病者理其任督乎膀胱氣化不行者助其腎氣以益膀胱乎氣血不能攝胎者益其氣血以攝胎乎則女子無子而可以有子矣不可徒治其胞胎也雷公曰天師之言真回天之法也然用天師法男女仍不生子奈何岐伯曰必夫婦德行交虧也修德以宜男豈虛語哉陳士鐸曰男無子有九女無子有十似乎女多於男也誰知男女皆一乎知不一而一者大約健其脾胃為主脾胃健而腎亦健矣何必分男女哉天人壽夭篇伯高太師問岐伯曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄可分壽夭然乎岐伯曰人有形則有氣有氣則有骨有骨則有肉有肉則有皮形必與氣相合也皮必與肉相稱也氣血經絡必與形相配也形充而皮膚緩者壽形充而皮膚急者夭形充而脈堅大者氣血之順也順則壽形充而脈小弱者氣血之衰也衰則危形充而顴不起者肉勝於骨也骨大則壽骨小則夭形充而大肉䐃堅有分理者皮勝於肉也肉疏則夭肉堅則壽形充而大肉無分理者皮僅包乎肉也肉厚壽肉脆夭此天生人不可強也故見則定人壽夭即可測人生死矣少師問曰誠若師言人之壽夭天定之矣無豫於人乎岐伯曰壽夭定於天挽回天命者人也壽夭聽於天戕賊其形骸瀉泄其精髓耗散其氣血不必至天數而先夭者天不任咎也少師曰天可回乎岐伯曰天不可回而天可節也節天之有餘補人之不足不亦善全其天命乎伯高太師聞之曰岐天師真善言天也世人賊天之不足烏能留人之有餘哉少師曰伯高非知在人之夭者乎在天之夭難回也在人之夭易延也吾亦修吾之天以全天命乎陳遠公曰天之夭難延人之夭易延亦訓世延人之夭也伯高之論因天師之教而推廣之不可輕天師而重伯高也命根養生篇伯高太師復問岐伯曰養生之道可得聞乎岐伯曰愚何足以知之伯高再問岐伯曰人生天地之中不能與天地並久者不體天地之道也天錫人以長生之命地錫人以長生之根天地錫人以命根者父母豫之也合父母之精以生人之身則精即人之命根也魂魄藏於精之中魂屬陽魄屬陰魂趨生魄趨死夫魂魄皆神也凡人皆有神內存則生外遊則死魂最善遊由於心之不寂也廣成子謂抱神以靜者正抱心而同寂也伯高曰夫精者非腎中之水乎水性主動心之不寂者不由於腎之不靜乎岐伯曰腎水之中有真火在焉水欲下而火欲升此精之所以不靜也精一動而心搖搖矣然而制精之不動仍在心之寂也伯高曰吾心寂矣腎之精欲動奈何岐伯曰水火原相須也無火則水不安無水則火亦不安制心而精動者由於腎水之涸也補先天之水以濟心則精不動而心易寂矣陳遠公曰精出於水亦出於水中之火也精動由於火動火不動則精安能搖乎可見精動由於心動也心動之極則水火俱動矣故安心為利精之法也救母篇容成問於岐伯曰天癸之水男女皆有之何以婦人經水謂之天癸乎岐伯曰天癸水壬癸之水也壬水屬陽癸水屬陰二水者先天之水也男為陽女為陰故婦人經水以天癸名之其實壬癸未嘗不合也容成曰男子之精不以天癸名者又何故歟岐伯曰精者合水火名之水中有火始成其精呼精而壬癸之義已包於內故不以天癸名之容成曰精與經同一水也何必兩名之岐伯曰同中有異也男之精守而不溢女之經滿而必泄也癸水者海水也上應月下應潮月有盈虧潮有往來女子之經水應之故潮汐月有信經水亦月有期也以天癸名之別其水為癸水隨天運為轉移耳容成曰其色赤者何也岐伯曰男之精陽中之陰也其色白女之經陰中之陽也其色赤況流於任脈通於血海血與經合而成濁流矣容成曰男之精虧而不溢者又何也岐伯曰女子陰有餘陽不足故滿而必泄男子陽有餘陰不足故守而不溢也容成曰味鹹者何也岐伯曰壬癸之水海水也海水味鹹故天癸之味應之容成曰女子二七經行稚女不行經何也岐伯曰女未二七則任沖未盛陰氣未動女猶純陽也故不行經耳容成曰女過二七不行經而懷孕者又何也岐伯曰女之變者也名為暗經非無經也無不足無有餘乃女中最貴者終身不字行調息之功必長生也容成問曰婦女經水上應月下應潮宜月無愆期矣何以有至有不至乎岐伯曰人事之乖違也天癸之水生於先天亦長於後天也婦女縱欲傷任督之脈則經水不應月矣懷抱憂鬱以傷肝膽則經水閉而不流矣容成曰其故何也岐伯曰人非水火不生火乃腎中之真火水乃腎中之真水也水火盛則經盛水火衰則經衰任督脈通於腎傷任督未有不傷腎者交接時縱欲泄精精傷任督之脈亦傷矣任督脈傷不能行其氣於腰臍則帶脈亦傷經水有至有不至矣夫經水者火中之水也水衰不能制火則火炎水降經水必先期至矣火衰不能生水則水寒火冷經水必後期至矣經水之愆期因水火之盛衰也容成曰肝膽傷而經閉者謂何岐伯曰肝藏血者也然又最喜疏泄膽與肝為表裡也膽木氣鬱肝木之氣亦郁矣木鬱不達任沖血海皆抑塞不通久則血枯矣容成曰木鬱何以使水之閉也岐伯曰心腎無晷不交者也心腎之交接責在胞胎亦責在肝膽也肝膽氣鬱胞胎上交肝膽不上交於心則腎之氣亦不交於心矣心腎之氣不交各臟腑之氣抑塞不通肝克脾膽克胃脾胃受克失其生化之司何能資於心腎乎水火未濟肝膽之氣愈郁矣肝膽久郁反現假旺之象外若盛內實虛腎因子虛轉去相濟涸水而鬱火焚之木安有餘波以下瀉乎此木鬱所以水閉也鬼臾區問曰氣鬱則血閉血即經乎岐伯曰經水非血也鬼臾區曰經水非血何以血閉而經即斷乎岐伯曰經水者天一之水也出於腎經故以經水名之鬼臾區曰水出於腎色宜白矣何赤乎岐伯曰經本者至陰之精有至陽之氣存焉故色赤耳非色赤即血也鬼臾區曰人之腎有補無瀉安有餘血乎岐伯曰經水者腎氣所化非腎精所瀉也女子腎氣有餘故變化無窮耳鬼臾區曰氣能化血各經之血不從之而瀉乎岐伯曰腎化為經經化為血各經氣血無不隨之而各化矣是以腎氣通則血通腎氣閉則血閉也鬼臾區曰然則氣閉宜責在腎矣何以心肝脾之氣鬱而經亦閉也岐伯曰腎水之生不由於三經腎水之化實關於三經也鬼臾區曰何也岐伯曰腎不通肝之氣則腎氣不能開腎不交心之氣則腎氣不能上腎不取脾之氣則腎氣不能成蓋交相合而交相化也苟一經氣鬱氣即不入於腎而腎氣即閉矣況三經同郁腎無所資何能化氣而成經乎是以經閉者乃腎氣之郁非止肝血之枯也倘徒補其血則鬱不宣反生火矣徒散其瘀則氣益微反耗精矣非惟無益而轉害之也鬼臾區曰大哉言乎請勒之金石以救萬世之母乎陳遠公曰一篇救母之文真有益於母者也講天癸無餘義由於講水火無餘義也水火之不通半成於人氣之郁解鬱之法在於通肝膽也肝膽通則血何閉哉正不必又去益腎也誰知肝膽不鬱而腎受益乎郁之害亦大矣紅鉛損益篇容成問曰方士採紅鉛接命可為訓乎岐天師曰慎欲者採之服食延壽縱欲者採之服食喪軀容成曰人能慎欲命自可延何藉紅鉛乎岐伯曰紅鉛延景丹也容成曰紅鉛者天癸水也雖包陰陽之水火溢滿於外則水火之氣盡消矣何以接命乎岐伯曰公之言論天癸則可非論首經之紅鉛也經水甫出戶輒色變獨首經之色不遽變者全其陰陽之氣也男子陽在外陰在內女子陰在外陽在內首經者坎中陽也以坎中之陽補離中之陰益乎不益乎獨補男有益補女有損補男者陽以濟陰也補女者陽以亢陽也容成曰善陳遠公曰紅鉛何益於人講無益而成有益者辨其既濟之理也誰謂方士非恃之以接命哉初生微論篇容成問曰人之初生目不能睹口不能餐足不能履舌不能語三月而後見八月而後食期歲而後行三年而後言其故何也岐伯曰人之初生兩腎水火未旺也三月而火乃盛故兩目有光也八月而水乃充故兩齦有力也期歲則髓旺而臏生矣三年則精長而囟合矣男十六天癸通女十四天癸化容成曰男以八為數女以七為數豫知之矣天師於二八二七之前內經何未言也岐伯曰內經首論天癸者嘆天癸難生易喪也男必至十六而天癸滿年未十六皆未滿之日也女必至十四而天癸盈年未十四皆未滿之日也既滿既盈又隨年俱耗示人宜守此天癸也容成曰男八八之後猶存女七七之後仍在似乎天癸之未盡也天師何以七七八八之後不再言之歟岐伯曰豫論常數耳常之數可定變之數不可定也豫所以論常不論變耳陳遠公曰人生以天癸為主有則生無則死也常變之說惜此天癸也二七二八之論亦可言而言之非不可言而不言也骨陰篇鳥師問於岐伯曰嬰兒初生無膝蓋骨何也岐伯曰嬰兒初生不止無膝蓋骨也囟骨耳後完骨皆無之鳥師曰何故也岐伯曰陰氣不足也陰氣者真陰之氣也嬰兒純陽無陰食母乳而陰乃生陰生而囟骨耳後完骨膝蓋骨生矣生則兒壽不生則夭鳥師曰其不生何也岐伯曰三骨屬陰得陰則生然亦必陽旺而長也嬰兒陽氣不足食母乳而三骨不生其先天之陽氣虧也陽氣先漓先天已居於缺陷食母之乳補後天而無餘此三骨之所以不生也三骨不生又焉能延齡乎鳥師曰三骨缺一亦能生乎岐伯曰缺一則不全乎其人矣鳥師曰請悉言之岐伯曰囟門不合則腦髓空也完骨不長則腎宮虛也膝蓋不生則雙足軟也腦髓空則風易入矣腎宮虛則聽失聰矣雙足軟則顛仆多矣鳥師曰吾見三骨不全亦有延齡者又何故歟岐伯曰三者之中惟耳無完骨者亦有延齡然而疾病不能無也若囟門不合膝蓋不生吾未見有生者蓋孤陽無陰也陳遠公曰孤陽無陰人則不生則陰為陽之天也無陰者無陽也陽生於陰之中陰長於陽之外有三骨者得陰陽之全也
